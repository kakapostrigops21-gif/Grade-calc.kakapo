<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GWA Calculator</title>
<style>
:root {
  --bg-app:#0f1117; --bg-surface:#1a1d27; --bg-card:#21253a;
  --bg-card2:#252940; --bg-input:#2a2f47; --bg-input-foc:#313755;
  --bg-hover:#2e3350; --accent:#6c63ff; --accent2:#a78bfa;
  --success:#22c55e; --danger:#ef4444; --warning:#f59e0b; --info:#38bdf8;
  --fg-primary:#f1f5f9; --fg-secondary:#94a3b8; --fg-muted:#64748b;
  --border:#2e3460; --border-light:#3d4470; --border-focus:#6c63ff;
  --pass-bg:#14532d; --pass-fg:#86efac;
  --fail-bg:#7f1d1d; --fail-fg:#fca5a5;
  --low-bg:#713f12; --low-fg:#fde68a;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg-app);color:var(--fg-primary);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:13px;display:flex;flex-direction:column;}
/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg-surface);}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px;}
/* ── Nav ── */
#nav{background:var(--bg-surface);height:56px;display:flex;align-items:center;flex-shrink:0;border-bottom:1px solid var(--border);}
#nav-accent-bar{width:4px;height:100%;background:var(--accent);}
#nav-title{font-size:22px;font-weight:bold;padding:0 16px;color:var(--fg-primary);}
#nav-sub{color:var(--fg-muted);font-size:9px;padding-left:4px;}
#nav-right{margin-left:auto;display:flex;align-items:center;padding:0 14px;gap:6px;}
/* ── Buttons ── */
.btn{border:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:bold;border-radius:4px;padding:7px 14px;transition:opacity .15s;white-space:nowrap;}
.btn:hover{opacity:.82;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-success{background:var(--success);color:#fff;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-ghost{background:var(--bg-card2);color:var(--fg-secondary);}
.btn-muted{background:var(--bg-input);color:var(--fg-secondary);}
.btn-sm{padding:5px 10px;font-size:10px;}
/* ── Main body ── */
#main-body{flex:1;display:grid;grid-template-columns:3fr 2fr;grid-template-rows:auto 1fr;gap:12px;padding:12px;overflow:hidden;min-height:0;}
/* ── Left config ── */
#left-config{display:flex;gap:8px;grid-column:1;grid-row:1;}
.config-card{background:var(--bg-card);border:1px solid var(--border);border-radius:6px;flex:1;overflow:hidden;display:flex;flex-direction:column;}
.card-header{color:var(--accent2);font-size:13px;font-weight:bold;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--bg-card);}
.card-body{padding:6px 0;}
.form-row{display:flex;align-items:center;padding:3px 8px;gap:6px;}
.form-label{color:var(--fg-muted);font-size:10px;text-align:right;min-width:68px;flex-shrink:0;}
.form-input,.form-select{background:var(--bg-input);color:var(--fg-primary);border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-family:inherit;font-size:13px;outline:none;width:100%;}
.form-input:focus,.form-select:focus{border-color:var(--border-focus);}
.form-select{cursor:pointer;appearance:auto;}
/* ── Right panel ── */
#right-panel{grid-column:2;grid-row:1;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;overflow:auto;}
/* ── Scale table ── */
.scale-table{width:100%;border-collapse:collapse;}
.scale-table th{background:var(--bg-card2);color:var(--fg-muted);font-size:10px;padding:6px 4px;text-align:center;position:sticky;top:0;}
.scale-table td{padding:4px 6px;text-align:center;font-size:10px;}
.scale-table tr:nth-child(even) td{background:var(--bg-card2);}
.scale-table tr:nth-child(odd) td{background:var(--bg-card);}
.scale-table td.accent{color:var(--accent2);font-weight:bold;}
.panel-title{color:var(--accent2);font-size:13px;font-weight:bold;padding:8px 14px;border-bottom:1px solid var(--border);}
/* ── Grade input area ── */
#grade-input-area{grid-column:1/3;grid-row:2;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
#grade-input-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;flex-shrink:0;}
#grade-input-title{color:var(--accent2);font-size:13px;font-weight:bold;}
#grade-input-btns{display:flex;gap:6px;}
#grade-input-scroll{flex:1;overflow-y:auto;overflow-x:hidden;}
#grade-input-content{padding:0;}
#result-bar{background:var(--bg-surface);padding:8px 14px;display:flex;align-items:center;gap:16px;flex-shrink:0;border-top:1px solid var(--border);}
#result-label{font-size:16px;font-weight:bold;color:var(--fg-muted);}
#equiv-label{font-size:13px;color:var(--fg-secondary);}
/* ── Grade input rows ── */
.gi-header-row {
    display: grid;
    background: var(--bg-card2);
    padding: 8px 12px;
    font-size: 13px;
    font-weight: bold;
    color: var(--accent2);
    position: sticky;
    top: 0;
    z-index: 5;
    grid-template-columns: 3fr 2fr 1fr;
    gap: 0;
}

.gi-data-row {
    display: grid;
    padding: 6px 12px;
    grid-template-columns: 3fr 2fr 1fr;
    gap: 0;
}

/* UNIFIED ALIGNMENT - inputs & spans match perfectly */
.gi-header-row > *,
.gi-data-row > * {
    display: flex;
    align-items: center;
    min-height: 32px;
    box-sizing: border-box;
    padding: 0 8px;
    margin: 0;
}

/* Column 1: Subject/Label - ALWAYS LEFT ALIGNED */
.gi-header-row > span:first-child,
.gi-data-row > span:first-child {
    justify-content: flex-start;
    text-align: left;
}

/* Second column = Center aligned (Grade Input) */
.gi-data-row > span:first-child,
.gi-data-row > input:first-child 
.gi-header-row > span:nth-child(2),
.gi-data-row > input {
    justify-content: center;
    text-align: center;
}

/* First column = Left aligned (Subject) */
.gi-header-row > span:first-child,
.gi-data-row > span:first-child {
    justify-content: flex-start;
    text-align: left;
}

/* Third column = Center aligned (Converted/Units) */
.gi-data-row > span:first-child,
.gi-data-row > input:first-child 
.gi-header-row > span:nth-child(2),
.gi-data-row > input {
    justify-content: center;
    text-align: center;
}

/* Input height matches header height exactly */
.gi-data-row input.gi-entry {
    height: 34px !important;
    padding: 0 10px !important;
    width: 150px !important;
    flex: 1;
}
.gi-data-row:nth-child(even){background:var(--bg-card2);}
.gi-data-row:nth-child(odd){background:var(--bg-card);}
.gi-entry{background:var(--bg-input);color:var(--fg-primary);border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-family:inherit;font-size:13px;outline:none;}
.gi-entry:focus{border-color:var(--border-focus);}
.gi-conv{color:var(--fg-muted);font-size:10px;text-align:center;}
/* ── Status colors ── */
.status-pass{color:var(--pass-fg);}
.status-fail{color:var(--fail-fg);}
.status-low{color:var(--low-fg);}
.result-pass{background:var(--pass-bg);color:var(--pass-fg);}
.result-fail{background:var(--fail-bg);color:var(--fail-fg);}
.result-low{background:var(--low-bg);color:var(--low-fg);}
/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;overflow:auto;padding:16px;}
.modal-window{background:var(--bg-app);border:1px solid var(--border);border-radius:8px;display:flex;flex-direction:column;max-height:92vh;min-width:400px;}
.modal-header{background:var(--accent);color:#fff;font-size:13px;font-weight:bold;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-radius:8px 8px 0 0;}
.modal-header-alt{background:var(--bg-card2);color:var(--accent2);font-size:13px;font-weight:bold;padding:8px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.modal-body{flex:1;overflow-y:auto;padding:12px;background:var(--bg-surface);}
.modal-footer{padding:8px 12px;background:var(--bg-surface);border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;}
/* ── Help window ── */
.help-section{padding:10px 16px;}
.help-section:nth-child(even){background:var(--bg-card);}
.help-section:nth-child(odd){background:var(--bg-card2);}
.help-title{color:var(--accent2);font-size:13px;font-weight:bold;margin-bottom:6px;}
.help-body{color:var(--fg-secondary);font-size:13px;white-space:pre-wrap;line-height:1.6;}
/* ── Detail window ── */
.detail-row{display:flex;}
.detail-row:nth-child(even){background:var(--bg-card);}
.detail-row:nth-child(odd){background:var(--bg-card2);}
.detail-key{color:var(--fg-muted);font-size:10px;min-width:110px;padding:5px 8px;text-align:right;}
.detail-val{color:var(--fg-primary);font-size:13px;padding:5px 8px;flex:1;}
/* ── Saved window ── */
.saved-row{background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:8px 12px;margin:4px 0;display:flex;align-items:center;gap:8px;}
.saved-row-info{flex:1;min-width:0;}
.saved-row-name{font-weight:bold;font-size:13px;color:var(--fg-primary);}
.saved-row-meta{color:var(--fg-muted);font-size:10px;margin-top:2px;}
.saved-row-btns{display:flex;gap:4px;flex-shrink:0;}
/* ── Split view ── */
.split-modal{min-width:min(1280px,96vw);max-width:96vw;max-height:94vh;width:1280px;}
.split-modal .modal-body{display:flex;flex-direction:column;padding:8px;gap:8px;}
.split-info-bar{background:var(--bg-surface);padding:8px 12px;border-radius:4px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.split-panels{display:flex;gap:8px;flex:1;min-height:0;height:580px;}
.split-panel{flex:1;display:flex;flex-direction:column;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.split-panel-header-left{background:var(--accent);color:#fff;font-size:13px;font-weight:bold;padding:8px 12px;flex-shrink:0;}
.split-panel-header-right{background:var(--bg-card2);color:var(--accent2);font-size:13px;font-weight:bold;padding:8px 12px;flex-shrink:0;}
.split-panel-body{flex:1;overflow-y:auto;padding:6px;}
.split-panel-footer{padding:8px 12px;background:var(--bg-card);border-top:1px solid var(--border);flex-shrink:0;}
.split-result-label{font-size:13px;font-weight:bold;color:var(--fg-muted);padding:4px 8px;}
/* ── SubjectDialog ── */
.subdialog{min-width:520px;max-width:600px;}
.sub-sec{background:var(--bg-card2);padding:6px 10px;margin:4px 0;border-radius:4px;}
.sub-sec-title{color:var(--accent2);font-size:12px;font-weight:bold;margin-bottom:4px;}
.sub-row{display:flex;align-items:center;gap:8px;padding:3px 0;}
.sub-label{color:var(--fg-muted);font-size:10px;min-width:130px;text-align:right;}
.sub-entry{background:var(--bg-input);color:var(--fg-primary);border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-family:inherit;font-size:13px;outline:none;}
.sub-entry:focus{border-color:var(--border-focus);}
.sub-result{font-size:16px;font-weight:bold;padding:8px 12px;text-align:center;}
.cb-row{display:flex;align-items:center;gap:8px;padding:3px 0;color:var(--fg-primary);font-size:13px;cursor:pointer;}
.cb-row input[type=checkbox]{accent-color:var(--accent);width:14px;height:14px;cursor:pointer;}
/* ── Info banner ── */
.info-banner{background:var(--bg-card2);color:var(--info);font-size:10px;padding:6px 12px;border-radius:4px;margin:4px 0;line-height:1.5;}
.desc-banner{background:var(--bg-card);color:var(--info);font-size:10px;padding:6px 12px;line-height:1.5;}
/* ── Pisay subject list ── */
.pisay-row{display:flex;align-items:center;padding:3px 12px;gap:8px;}
.pisay-row:nth-child(even){background:var(--bg-card2);}
.pisay-row:nth-child(odd){background:var(--bg-card);}
.pisay-btn{background:transparent;border:none;cursor:pointer;font-family:inherit;font-size:13px;color:var(--fg-secondary);text-align:left;padding:6px 4px;min-width:200px;}
.pisay-btn:hover{color:var(--accent2);}
.pisay-btn.entered{color:var(--accent2);}
/* ── Split panel entry rows ── */
.sp-entry-row{display:grid;align-items:center;padding:5px 10px;gap:8px;}
.sp-entry-row:nth-child(even){background:var(--bg-card2);}
.sp-entry-row:nth-child(odd){background:var(--bg-card);}
/* ── Search bar ── */
.search-bar{display:flex;gap:8px;align-items:center;padding:8px;}
.search-bar input{background:var(--bg-input);color:var(--fg-primary);border:1px solid var(--border);border-radius:4px;padding:5px 10px;font-family:inherit;font-size:13px;outline:none;flex:1;}
.search-bar input:focus{border-color:var(--border-focus);}
/* ── Misc ── */
.sect-divider{height:1px;background:var(--border);margin:8px 0;}
.panel-subhdr{display:grid;background:var(--bg-card2);padding:5px 10px;font-size:10px;color:var(--fg-muted);font-weight:bold;}
.panel-entry-row{display:grid;align-items:center;padding:5px 10px;gap:8px;}
.panel-entry-row:nth-child(even){background:var(--bg-card2);}
.panel-entry-row:nth-child(odd){background:var(--bg-card);}
/* Force horizontal layout on mobile/tablets */
/* Force horizontal layout on mobile/tablets */
@media (max-width: 1024px) {
  html, body {
    overflow-y: auto;
    overflow-x: hidden;
    height: auto;
  }
  
  #nav {
    flex-wrap: wrap;
    height: auto;
    min-height: 56px;
    padding: 8px 0;
    position: relative;
    z-index: 100;
  }
  
  #nav-right {
    flex-wrap: wrap;
    width: 100%;
    justify-content: flex-end;
    padding: 4px 14px;
    gap: 4px;
  }
  
  #nav-sub {
    display: none;
  }
  
  #main-body {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto auto;
    overflow-y: visible;
    overflow-x: hidden;
    height: auto;
    min-height: auto;
    padding: 12px;
  }
  
  #left-config {
    grid-column: 1;
    grid-row: 1;
    flex-direction: column;
  }
  
  /* Fix Settings card body to show all content */
  #settings-body {
    max-height: none;
    overflow-y: visible;
  }
  
  .config-card {
    overflow: visible;
    min-height: auto;
  }
  
  #right-panel {
    grid-column: 1;
    grid-row: 2;
    min-height: 300px;
  }
  
  #grade-input-area {
    grid-column: 1;
    grid-row: 3;
    min-height: 400px;
  }
  
  body, #main-body, #grade-input-scroll, .modal-body {
    -webkit-overflow-scrolling: touch;
  }
  
  /* Fix modal windows for mobile */
  .modal-overlay {
    padding: 8px;
  }
  
  .modal-window {
    min-width: auto;
    width: calc(100vw - 16px);
    max-width: calc(100vw - 16px);
    max-height: calc(100vh - 16px);
  }
  
  /* Fix saved window specifically */
  .saved-row {
    flex-direction: column;
    align-items: flex-start;
  }
  
  .saved-row-btns {
    width: 100%;
    justify-content: space-between;
    margin-top: 8px;
  }
  
  .saved-row-btns .btn {
    flex: 1;
  }
  
  /* Fix search bar on mobile */
  .search-bar {
    flex-direction: column;
  }
  
  .search-bar input {
    width: 100%;
  }
  
  .search-bar button {
    width: 100%;
  }
  
  /* Fix split view modal on mobile */
  .split-modal {
    min-width: auto;
    width: calc(100vw - 16px);
    max-width: calc(100vw - 16px);
  }
  
  .split-panels {
    flex-direction: column;
    height: auto;
  }
  
  .split-panel {
    min-height: 300px;
  }
  
  /* Fix help window */
  .help-section {
    padding: 8px 12px;
  }
  
  /* Fix subject dialog */
  .subdialog {
    min-width: auto;
    width: calc(100vw - 32px);
    max-width: calc(100vw - 32px);
  }
}
</style>
</head><body>
<!-- Nav -->
<div id="nav">
  <div id="nav-accent-bar"></div>
  <span id="nav-title">GWA Calculator</span>
  <span id="nav-sub">PISAY  /  DepEd  /  Others  /  International</span>
  <div id="nav-right">
    <button class="btn btn-muted" onclick="showLanguageSelector()">Language</button>
    <button class="btn btn-primary" onclick="handleSave()">Save</button>
    <button class="btn btn-ghost" onclick="showSavedWindow()">Files</button>
    <button class="btn btn-ghost" onclick="showSearchWindow()">Search</button>
    <button class="btn btn-ghost" onclick="showHelpWindow()">Help</button>
  </div>
</div>

<!-- Main body -->
<div id="main-body">
  <!-- Left config (col 1, row 1) -->
  <div id="left-config">
    <!-- Student Info Card -->
    <div class="config-card" id="student-info-card">
      <div class="card-header">Student Info</div>
      <div class="card-body">
        <div class="form-row"><span class="form-label">Full Name</span><input class="form-input" id="stu-name" type="text"></div>
        <div class="form-row"><span class="form-label">Student ID</span><input class="form-input" id="stu-id" type="text"></div>
        <div class="form-row"><span class="form-label">Grade Lvl</span><input class="form-input" id="stu-grade" type="text"></div>
        <div class="form-row"><span class="form-label">Section</span><input class="form-input" id="stu-section" type="text"></div>
        <div class="form-row"><span class="form-label">Quarter</span>
          <select class="form-select" id="stu-quarter">
            <option>Q1</option><option>Q2</option><option>Q3</option><option>Q4</option>
          </select>
        </div>
      </div>
    </div>
    <!-- Settings Card -->
    <div class="config-card" id="settings-card">
      <div class="card-header">Settings</div>
      <div class="card-body" id="settings-body">
        <div class="form-row"><span class="form-label">System</span>
          <select class="form-select" id="sys-select" onchange="onSystemChange()"></select>
        </div>
        <div class="form-row"><span class="form-label">Grading</span>
          <select class="form-select" id="grading-select" onchange="onGradingChange()">
            <option value="Percentile">Percentile</option>
            <option value="GWA">GWA</option>
          </select>
        </div>
        <div class="form-row"><span class="form-label">Type</span>
          <select class="form-select" id="type-select" onchange="onTypeChange()"></select>
        </div>
        <!-- School level row (country systems) -->
        <div class="form-row" id="school-level-row" style="display:none;">
          <span class="form-label" style="color:var(--accent2);">School Level</span>
          <select class="form-select" id="school-level-select" onchange="onSchoolLevelChange()"></select>
        </div>
        <!-- Pisay grade level -->
        <div class="form-row" id="grade-level-row" style="display:none;">
          <span class="form-label">Grade Lvl</span>
          <select class="form-select" id="grade-level-select" onchange="onGradeLevelChange()">
            <option>7</option><option>8</option><option>9</option><option>10</option><option value="11" selected>11</option><option>12</option>
          </select>
        </div>
        <!-- Pisay elective -->
        <div class="form-row" id="elect-row" style="display:none;">
          <span class="form-label">Elective</span>
          <select class="form-select" id="elect-select"></select>
        </div>
        <!-- Pisay core -->
        <div class="form-row" id="core-row" style="display:none;">
          <span class="form-label">Core Sci</span>
          <select class="form-select" id="core-select">
            <option>Biology</option><option>Chemistry</option><option>Physics</option>
          </select>
        </div>
        <!-- Number -->
        <div class="form-row" id="num-row">
          <span class="form-label" id="num-label">Subjects</span>
          <input class="form-input" id="num-entry" type="number" min="1" value="1" style="width:70px;">
        </div>
        <!-- Country info label -->
        <div class="info-banner" id="country-info-lbl" style="display:none;"></div>
        <!-- Buttons -->
        <div class="form-row" style="gap:8px;padding:8px;">
          <button class="btn btn-primary" style="flex:1;padding:8px;" onclick="handleGenerate()">Generate</button>
          <button class="btn btn-danger" style="padding:8px 14px;" onclick="handleClearAll()">Clear</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Right panel (col 2, row 1) -->
  <div id="right-panel"></div>

  <!-- Grade input area (col 1-2, row 2) -->
  <div id="grade-input-area">
    <div id="grade-input-header">
      <span id="grade-input-title">Grade Input</span>
      <div id="grade-input-btns">
        <button class="btn btn-success btn-sm" id="add-subj-btn" style="display:none;" onclick="addPisaySubject()">+ Add Subject</button>
        <button class="btn btn-danger btn-sm" id="rm-subj-btn" style="display:none;" onclick="rmPisaySubject()">- Remove Last</button>
      </div>
    </div>
    <div id="grade-input-scroll">
      <div id="grade-input-content"></div>
    </div>
    <div id="result-bar">

let currentLang = localStorage.getItem('gwa_language') || 'en';

function t(key) {
  return TRANSLATIONS[currentLang][key] || TRANSLATIONS.en[key] || key;
}

function ui(key) {
  if (TRANSLATIONS.ui && TRANSLATIONS.ui[key]) {
    return TRANSLATIONS.ui[key][currentLang] || TRANSLATIONS.ui[key].en || key;
  }
  return key;
}


function getInputHint(scale) {
  const hints = TRANSLATIONS[currentLang]?.input_hints || TRANSLATIONS.en.input_hints;
  return hints[scale] || LETTER_HINTS[scale] || '';
}

function translateSchoolLevel(level) {
  if (!level) return level;
  const levels = TRANSLATIONS.school_levels;
  if (levels && levels[level]) {
    return levels[level][currentLang] || levels[level].en || level;
  }
  return level;
}

function translateCountryName(countryKey) {
  const mapping = {
    "🇺🇸 United States": "country_united_states",
    "🇬🇧 United Kingdom": "country_united_kingdom",
    "🇨🇦 Canada": "country_canada",
    "🇯🇵 Japan": "country_japan",
    "🇰🇷 South Korea": "country_south_korea",
    "🇦🇺 Australia": "country_australia",
    "🇩🇪 Germany": "country_germany",
    "🇹🇼 Taiwan  ": "country_taiwan",
    "🇹🇼 Taiwan": "country_taiwan", 
    "🇨🇳 China": "country_china"
  };
  return mapping[countryKey] ? t(mapping[countryKey]) : countryKey;
}

function tType(type) {
  const map = {
    'Subject': t('subject'),
    'Overall': t('overall'),
    'Desired Grade': t('desired_grade'),
    'Individual Subject & Quarter GWA': t('individual_subject')
  };
  return map[type] || type;
}

function updateUILanguage() {
  // Batch all DOM updates - read first, then write to avoid layout thrashing
  const updates = [];

  updates.push(['nav-title', 'textContent', t('app_title')]);
  updates.push(['nav-sub', 'textContent', t('nav_sub')]);

  // Apply batched updates
  for (const [id, prop, val] of updates) {
    const el = document.getElementById(id);
    if (el) el[prop] = val;
  }

  const cardHeaders = document.querySelectorAll('.card-header');
  if (cardHeaders[0]) cardHeaders[0].textContent = t('student_info');
  if (cardHeaders[1]) cardHeaders[1].textContent = t('settings');

  const gradeInputTitle = document.getElementById('grade-input-title');
  if (gradeInputTitle) gradeInputTitle.textContent = t('grade_input');

  // Student info labels - use data attributes to avoid text-matching lag
  const labelKeys = {
    'stu-name': 'full_name', 'stu-id': 'student_id', 'stu-grade': 'grade_level',
    'stu-section': 'section', 'stu-quarter': 'quarter'
  };
  for (const [id, key] of Object.entries(labelKeys)) {
    const input = document.getElementById(id);
    if (input && input.previousElementSibling) input.previousElementSibling.textContent = t(key);
  }

  // Settings labels by ID - direct and fast
  const settingsLabelMap = [
    ['sys-select', 'system'], ['grading-select', 'grading'], ['type-select', 'type']
  ];
  for (const [inputId, key] of settingsLabelMap) {
    const el = document.getElementById(inputId);
    if (el && el.previousElementSibling) el.previousElementSibling.textContent = t(key);
  }

  // School level, elective, core labels
  const slLabel = document.querySelector('#school-level-row .form-label');
  if (slLabel) slLabel.textContent = t('school_level');
  const elLabel = document.querySelector('#elect-row .form-label');
  if (elLabel) elLabel.textContent = t('elective');
  const coLabel = document.querySelector('#core-row .form-label');
  if (coLabel) coLabel.textContent = t('core_sci');

  // Num label
  const numLbl = document.getElementById('num-label');
  if (numLbl) numLbl.textContent = (state.calcType === 'Overall') ? t('periods') : t('subjects');

  // Translate selects - grading
  const gradingSelect = document.getElementById('grading-select');
  if (gradingSelect) {
    Array.from(gradingSelect.options).forEach(opt => {
      if (opt.value === 'Percentile') opt.textContent = t('percentile');
      else if (opt.value === 'GWA') opt.textContent = t('gwa');
    });
  }

  // Translate type select
  const typeSelect = document.getElementById('type-select');
  if (typeSelect) {
    Array.from(typeSelect.options).forEach(opt => { opt.textContent = tType(opt.value); });
  }

  // Quarter select
  const quarterSelect = document.getElementById('stu-quarter');
  if (quarterSelect) {
    Array.from(quarterSelect.options).forEach((opt, i) => { opt.textContent = t('q'+(i+1)); });
  }

  // System select - only translate known values, keep country flags as-is
  const sysSelect = document.getElementById('sys-select');
  if (sysSelect) {
    const currentValue = sysSelect.value;
    Array.from(sysSelect.options).forEach(opt => {
      const v = opt.value;
      if (v === 'Pisay') opt.textContent = t('pisay');
      else if (v === 'DepEd') opt.textContent = t('deped');
      else if (v === 'Standard') opt.textContent = t('standard');
      else if (v === 'Others') opt.textContent = t('others');
      else opt.textContent = translateCountryName(v);
    });
    sysSelect.value = currentValue;
  }

  // School level dropdown - translate if country system
  const slSel = document.getElementById('school-level-select');
  if (slSel && isCountrySystem(state.system)) {
    const levels = COUNTRY_SYSTEMS[state.system] ? COUNTRY_SYSTEMS[state.system].levels || [] : [];
    const curVal = slSel.value;
    slSel.innerHTML = '';
    for (const lv of levels) {
      const o = document.createElement('option');
      o.value = lv; o.textContent = translateSchoolLevel(lv);
      slSel.appendChild(o);
    }
    if (levels.includes(curVal)) slSel.value = curVal;
    else if (levels.length) slSel.value = levels[0];
  }

  // Nav buttons
  const navBtns = document.querySelectorAll('#nav-right .btn');
  navBtns.forEach(btn => {
    const oc = btn.getAttribute('onclick') || '';
    if (oc.includes('showLanguageSelector')) btn.textContent = t('language');
    else if (oc.includes('handleSave')) btn.textContent = t('save');
    else if (oc.includes('showSavedWindow')) btn.textContent = t('files');
    else if (oc.includes('showSearchWindow')) btn.textContent = t('search');
    else if (oc.includes('showHelpWindow')) btn.textContent = t('help');
  });

  // Generate/Clear buttons
  const generateBtn = document.querySelector('#settings-body .btn-primary');
  if (generateBtn) generateBtn.textContent = t('generate');
  const clearBtn = document.querySelector('#settings-body .btn-danger');
  if (clearBtn) clearBtn.textContent = t('clear');

  // Add/remove subject buttons
  const addBtn = document.getElementById('add-subj-btn');
  if (addBtn) addBtn.textContent = t('add_subject');
  const rmBtn = document.getElementById('rm-subj-btn');
  if (rmBtn) rmBtn.textContent = t('remove_last');

  // Calculate button
  const calcBtn = document.querySelector('#result-bar .btn-primary');
  if (calcBtn) calcBtn.textContent = t('calculate');

  setResult(t('enter_grades'), 'var(--fg-muted)');
  refreshRightPanel();
}

  hdr.innerHTML = `<span>${t('language')}</span><button class="btn btn-ghost btn-sm" onclick="closeModal()">X</button>`;
  
  const body = document.createElement('div');
  body.className = 'modal-body';
  body.style.cssText = 'background:var(--bg-surface);padding:12px;min-width:320px;';
  
  for (const lang of langs) {

    btn.className = 'btn btn-primary';
    btn.style.cssText = 'width:100%;padding:12px;margin:4px 0;font-size:14px;';
    if (lang.code === currentLang) {
      btn.style.background = 'var(--success)';
    }
    btn.textContent = lang.name;
    btn.onclick = () => {
      currentLang = lang.code;
      localStorage.setItem('gwa_language', lang.code);
      updateUILanguage();
      closeModal();
      alertMsg(`Language changed to ${lang.name}`);
    };
    body.appendChild(btn);
  }
  
  win.append(hdr, body);
  showModal(win);
}

//  STORAGE (IndexedDB — closest HTML equiv to SQLite)
// ─────────────────────────────────────────────
const DB_NAME = 'gwa_calculator', DB_VERSION = 1, STORE = 'grade_files';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE)) {
        const store = db.createObjectStore(STORE, { keyPath: 'file_name' });
        store.createIndex('created_at', 'created_at', { unique: false });
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}

async function dbLoadAll() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).index('created_at').getAll();
    req.onsuccess = e => resolve(e.target.result.reverse()); // DESC order
    req.onerror   = e => reject(e.target.error);
  });
}

async function dbSave(record) {
  if (!record.created_at) record.created_at = Date.now();
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put(record);
    tx.oncomplete = resolve;
    tx.onerror    = e => reject(e.target.error);
  });
}

async function dbSearch(query) {
  const q = query.toLowerCase();
  const all = await dbLoadAll();
  return all.filter(r =>
    (r.file_name||'').toLowerCase().includes(q) ||
    (r.student_id||'').toLowerCase().includes(q)
  );
}

async function dbDelete(fileName) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).delete(fileName);
    tx.oncomplete = resolve;
    tx.onerror    = e => reject(e.target.error);
  });
}

function parseFraction(v) {
  v = v.trim();
  if (v.includes('/')) {
    const parts = v.split('/');
    const n = parseFloat(parts[0]), d = parseFloat(parts[1]);
    if (d === 0) throw new Error("Division by zero");
    return n / d;
  }
  const f = parseFloat(v);
  if (isNaN(f)) throw new Error("Not a number");
  return f;
}

function convertToGWA(gwa) {
  if (gwa >= 96) return "1.00";
  else if (gwa >= 90) return "1.25";
  else if (gwa >= 84) return "1.50";
  else if (gwa >= 78) return "1.75";
  else if (gwa >= 72) return "2.00";
  else if (gwa >= 66) return "2.25";
  else if (gwa >= 60) return "2.50";
  else if (gwa >= 55) return "2.75";
  else return "3.00 or below";
}

function capVal(v) { return Math.min(v, 100.0); }

function toNum(v, isGwa=false) {
  if (!v) return null;
  try {
    v = v.trim();
    if (!isGwa) {
      let val;
      if (v.endsWith('%')) { val = parseFloat(v) / 100; }
      else { val = parseFraction(v); if (val > 1) val /= 100; }
      return (val >= 0 && val <= 1) ? val : null;
    } else {
      const val = parseFraction(v);
      return (val >= 1 && val <= 5) ? val : null;
    }
  } catch { return null; }
}

function toNumCountry(v, mode) {
  if (!v) return null;
  try {
    const val = parseFraction(v.trim());
    if (mode === "Percentage") return (val >= 0 && val <= 100) ? val : null;
    if (mode === "GPA_4") return (val >= 0 && val <= 4.0) ? val : null;
    if (mode === "GPA_4_5") return (val >= 0 && val <= 4.5) ? val : null;
    if (mode === "GCSE") return (val >= 0 && val <= 9) ? val : null;
    if (mode === "DE_1_6") return (val >= 1 && val <= 6) ? val : null;
    if (mode === "DE_ABITUR") return (val >= 0 && val <= 15) ? val : null;
    if (mode === "DE_UNI") return (val >= 1.0 && val <= 5.0) ? val : null;
    return (val >= 0 && val <= 100) ? val : null;
  } catch { return null; }
}

function parseCountryEntry(raw, scale, mode) {
  if (!raw || !raw.trim()) return [null, null];
  const key = raw.trim().toUpperCase();
  const lmap = LETTER_MAP[scale] || {};
  if (lmap[key] !== undefined) return [lmap[key], raw.trim()];
  // special: multi-char like "2:1"
  const key2 = raw.trim().toUpperCase();
  if (lmap[key2] !== undefined) return [lmap[key2], raw.trim()];
  const numeric = toNumCountry(raw, mode);
  if (numeric !== null) return [numeric, null];
  throw new Error(`Invalid value '${raw}'. ${LETTER_HINTS[scale] || 'Enter a valid grade.'}`);
}

function resolveEntryToNumeric(raw, scale, mode) {
  if (!raw || !String(raw).trim()) return null;
  try { const [n] = parseCountryEntry(String(raw), scale, mode); return n; }
  catch { return null; }
}

function formatNumericForMode(val, mode) {
  if (val === null || val === undefined) return "—";
  if (mode === "GPA_4" || mode === "GPA_4_5") return val.toFixed(2);
  if (mode === "GCSE") return val.toFixed(1);
  if (mode === "DE_1_6") return val.toFixed(0);
  if (mode === "DE_ABITUR") return val.toFixed(0) + " pts";
  if (mode === "DE_UNI") return val.toFixed(1);
  return val.toFixed(1) + "%";
}

function getCountryInfo(system, schoolLevel) {
  if (!system || !schoolLevel) return null;

  // Direct match
  if (COUNTRY_SYSTEMS[system] && COUNTRY_SYSTEMS[system][schoolLevel]) {
    return COUNTRY_SYSTEMS[system][schoolLevel];
  }

  // Fuzzy match (handles flags or partial names)
  for (const [key, data] of Object.entries(COUNTRY_SYSTEMS)) {
    if (key.includes(system) || system.includes(key.split(' ')[0])) {
      if (data[schoolLevel]) return data[schoolLevel];
    }
  }
  return null;
}

function isCountrySystem(system) {
  if (!system) return false;
  return Object.keys(COUNTRY_SYSTEMS).some(key => 
    key === system || key.includes(system) || system.includes(key)
  );
}

function getCountryInfo(system, schoolLevel) {

  // Direct match with flag
  if (COUNTRY_SYSTEMS[system] && COUNTRY_SYSTEMS[system][schoolLevel]) {

function ordinal(n) {
  if (n >= 10 && n <= 20) return n + "th";
  const s = ["th","st","nd","rd","th","th","th","th","th","th"][n % 10];
  return n + s;
}

function countryStatus(value, system, schoolLevel) {
  const info = getCountryInfo(system, schoolLevel);
  if (!info) return ["?","pass"];
  const passing = info.passing, mode = info.grading_mode;
  if (mode === "GPA_4" || mode === "GPA_4_5") {
    if (value >= passing) return ["PASSED ✅","pass"];
    else if (value >= passing * 0.75) return ["LOW GRADE ⚠","low"];
    else return ["FAILED ❌","fail"];
  } else if (mode === "GCSE") {
    if (value >= passing) return ["PASSED ✅","pass"];
    else if (value >= passing - 1) return ["LOW GRADE ⚠","low"];
    else return ["FAILED ❌","fail"];
  } else {
    if (value >= passing) return ["PASSED ✅","pass"];
    else if (value >= passing * 0.9) return ["LOW GRADE ⚠","low"];
    else return ["FAILED ❌","fail"];
  }
}

function gwaStatus(value, system="", grading="", schoolLevel="") {
  if (isCountrySystem(system)) return countryStatus(value, system, schoolLevel);
  const isGwaMode = (grading === "GWA");
  if (isGwaMode) {
    if (system === "Pisay") {
      if (value <= 2.25) return ["PASSED ✅","pass"];
      else if (value <= 3.00) return ["LOW GRADE ⚠","low"];
      else return ["FAILED ❌","fail"];
    } else {
      if (value <= 3.00) return ["PASSED ✅","pass"];
      else if (value <= 3.50) return ["LOW GRADE ⚠","low"];
      else return ["FAILED ❌","fail"];
    }
  } else {
    if (system === "Pisay") {
      const equiv = convertToGWA(value);
      try {
        const gv = parseFloat(equiv.split(' ')[0]);
        if (gv <= 2.25) return ["PASSED ✅","pass"];
        else if (gv <= 3.00) return ["LOW GRADE ⚠","low"];
        else return ["FAILED ❌","fail"];
      } catch {}
    }
    return value >= 60 ? ["PASSED ✅","pass"] : ["FAILED ❌","fail"];
  }
}

function statusColors(colorKey) {
  return {
    pass: ["var(--pass-bg)","var(--pass-fg)","var(--success)"],
    low:  ["var(--low-bg)", "var(--low-fg)", "var(--warning)"],
    fail: ["var(--fail-bg)","var(--fail-fg)","var(--danger)"]
  }[colorKey] || ["var(--bg-card2)","var(--fg-muted)","var(--fg-muted)"];
}

function countryGradeLabel(value, system, schoolLevel) {
  const info = getCountryInfo(system, schoolLevel);
  if (!info) return "";
  const mode = info.grading_mode, grades = info.grades || [];
  if (mode === "GPA_4" || mode === "GPA_4_5") {
    let best = null, bestDiff = Infinity;
    for (const g of grades) {
      const diff = Math.abs(value - g[1]);
      if (diff < bestDiff) { bestDiff = diff; best = g[0]; }
    }
    return best || "";
  } else {
    for (const g of grades) {
      const lo = g[1], hi = g[2];
      if (lo <= value && value <= hi) {
        const extra = g[3] || "";
        return g[0] + (extra ? ` (${extra})` : "");
      }
    }
  }
  return "";
}

function countryGpaEquivalent(value, system, schoolLevel) {
  const info = getCountryInfo(system, schoolLevel);
  if (!info) return null;
  const scale = info.scale, grades = info.grades || [];
  if (["US_PS","CA_PS","JP_COL","JP_PS","AU_HD","AU_PS","KR_PS","UK_GCSE","UK_DEG"].includes(scale)) {
    for (const g of grades) {
      const lo = g[1], hi = g[2];
      if (lo <= value && value <= hi && g[3]) return g[3];
    }
  }
  return null;
}

//  COMPUTATION
// ─────────────────────────────────────────────
function computeResult(entryVals, sysVal, gradingVal, typVal) {
  if (sysVal === "Pisay" && typVal === "Subject") {
    let total = 0, units = 0;
    for (let i = 0; i < entryVals.length; i += 2) {
      const g = toNum(String(entryVals[i]), true);
      if (g === null) throw new Error("Invalid GWA grade");
      const u = parseFloat(entryVals[i+1]) || 1;
      total += g * u; units += u;
    }
    if (units === 0) throw new Error("No units");
    const v = total / units;
    return [`GWA: ${v.toFixed(4)}`, v];
  }
  if ((sysVal === "Others" || sysVal === "Standard") && typVal === "Subject" && gradingVal === "GWA") {
    let total = 0, units = 0;
    for (let i = 0; i < entryVals.length; i += 2) {
      const g = toNum(String(entryVals[i]), true);
      if (g === null) throw new Error("Invalid GWA grade");
      const u = parseFloat(entryVals[i+1]) || 1;
      total += g * u; units += u;
    }
    if (units === 0) throw new Error("No units");
    const v = total / units;
    return [`GWA: ${v.toFixed(4)}`, v];
  }
  if (gradingVal === "Percentile") {
    const vals = entryVals.map(e => toNum(String(e)));
    if (vals.some(v => v === null)) throw new Error("Invalid percentile value");
    const avg = (vals.reduce((a,b) => a+b, 0) / vals.length) * 100;
    const lbl = typVal === "Subject" ? "Quarter Grade" : "Average";
    return [`${lbl}: ${avg.toFixed(2)}%`, avg];
  }
  if (typVal === "Overall" && gradingVal === "GWA") {
    const p = toNum(String(entryVals[0]), true);
    const pw = toNum(String(entryVals[1]));
    const c = toNum(String(entryVals[2]), true);
    const cw = toNum(String(entryVals[3]));
    if ([p,pw,c,cw].some(v => v===null)) throw new Error("Invalid input");
    const val = p * pw + c * cw;
    return [`Final Quarter Grade: ${val.toFixed(4)}`, val];
  }
  throw new Error("Unhandled mode");
}

function computeResultCountryFromList(rawVals, system, schoolLevel, typVal) {
  const info = getCountryInfo(system, schoolLevel);
  if (!info) throw new Error("Unknown country/level combination.");
  const mode = info.grading_mode, scale = info.scale;
  const values = [];
  for (const raw of rawVals) {
    const r = String(raw).trim();
    if (!r) continue;
    const [numeric] = parseCountryEntry(r, scale, mode);
    if (numeric === null) throw new Error(`Invalid saved value '${raw}'.`);
    values.push(numeric);
  }
  if (values.length === 0) throw new Error("No grades.");
  const avg = values.reduce((a,b) => a+b, 0) / values.length;
  const label = typVal === "Subject" ? "Average" : "Overall Average";
  if (mode === "GPA_4" || mode === "GPA_4_5") return [`${label}: ${avg.toFixed(3)}`, avg];
  if (mode === "GCSE") return [`${label}: ${avg.toFixed(2)}`, avg];
  return [`${label}: ${avg.toFixed(2)}%`, avg];
}

function bindArrowNav(entriesList, cols=1) {
  function move(widget, dr, dc) {
    const idx = entriesList.indexOf(widget);
    if (idx < 0) return;
    const row = Math.floor(idx / cols), col = idx % cols;
    let nr = row + dr, nc = col + dc;
    if (nc < 0) { nc = cols-1; nr--; }
    else if (nc >= cols) { nc = 0; nr++; }
    const ni = nr * cols + nc;
    if (ni >= 0 && ni < entriesList.length) {
      entriesList[ni].focus();
      if (entriesList[ni].select) entriesList[ni].select();
    }
  }
  for (const e of entriesList) {
    e.addEventListener('keydown', ev => {
      if (ev.key === 'ArrowUp') { ev.preventDefault(); move(e,-1,0); }
      else if (ev.key === 'ArrowDown') { ev.preventDefault(); move(e,1,0); }
      else if (ev.key === 'ArrowLeft') { ev.preventDefault(); move(e,0,-1); }
      else if (ev.key === 'ArrowRight') { ev.preventDefault(); move(e,0,1); }
      else if (ev.key === 'Enter') { ev.preventDefault(); move(e,1,0); }
    });
  }
}

function onGradeLevelChange() {
  state.gradeLevel = document.getElementById('grade-level-select').value;
  updateGradeLevel();
  updateNumLabel();
}

function updateGradeLevel() {
  const gl = document.getElementById('grade-level-select').value;
  state.gradeLevel = gl;
  const elRow = document.getElementById('elect-row');
  const elSel = document.getElementById('elect-select');
  const coRow = document.getElementById('core-row');
  const elecs = PISAY_DATA.electives[gl];
  if (elecs) {
    elSel.innerHTML = '';
    for (const e of elecs) { const o=document.createElement('option'); o.value=e; o.textContent=e; elSel.appendChild(o); }
    state.electChoice = elecs[0];
    elRow.style.display = 'flex';
  } else { elRow.style.display='none'; }
  coRow.style.display = parseInt(gl) >= 11 ? 'flex' : 'none';
}

function updateTypeOptions() {
  const sys = state.system;
  const gr = state.gradingSys;
  if (isCountrySystem(sys)) {
    setTypeOptions(["Subject","Overall","Desired Grade"]);
  } else if (gr === "Percentile") {
    if (sys === "Pisay") setTypeOptions(["Subject","Overall","Individual Subject & Quarter GWA"]);
    else setTypeOptions(["Subject","Overall"]);
  } else {
    if (sys === "Pisay") setTypeOptions(["Subject","Overall","Individual Subject & Quarter GWA","Desired Grade"]);
    else setTypeOptions(["Subject","Overall","Desired Grade"]);
  }
}

function updateNumLabel() {
  const typ = state.calcType;
  const sys = state.system;
  const numLbl = document.getElementById('num-label');
  if (typ === "Subject" || typ === "Individual Subject & Quarter GWA") numLbl.textContent = t('subjects');
  else if (typ === "Overall") numLbl.textContent = t('periods');
  else numLbl.textContent = "(unused)";
  if (sys === "Pisay" && (typ === "Subject" || typ === "Individual Subject & Quarter GWA")) {
    const subs = PISAY_DATA[state.gradeLevel] || [];
    document.getElementById('num-entry').value = subs.length;
  }
}

//  RIGHT PANEL
// ─────────────────────────────────────────────
function refreshRightPanel() {
  const rp = document.getElementById('right-panel');
  rp.innerHTML = '';

  const sys = state.system;
  const sl = state.schoolLevel || document.getElementById('school-level-select')?.value;

  if (isCountrySystem(sys) && sl) {
    const info = getCountryInfo(sys, sl);
    if (info) {
      const mode = info.grading_mode;
      const grades = info.grades || [];

      const hdr = document.createElement('div');
      hdr.className = 'panel-title';
      hdr.textContent = `Grade Scale — ${translateSchoolLevel(sl)}`;
      rp.appendChild(hdr);

      const tbl = document.createElement('table');
      tbl.className = 'scale-table';

      let hdrs = ["Grade", "Range (%)", "Notes"];
      if (mode === "GPA_4" || mode === "GPA_4_5") hdrs = ["Grade", "GPA", ""];
      else if (mode === "GCSE") hdrs = ["Band", "Score", "Equiv"];

      const thead = document.createElement('thead');
      const hrow = document.createElement('tr');
      hdrs.forEach(h => {
        const th = document.createElement('th');
        th.textContent = h;
        hrow.appendChild(th);
      });
      thead.appendChild(hrow);
      tbl.appendChild(thead);

      // Build rows
      const tbody = document.createElement('tbody');
      for (const g of grades) {
        const tr = document.createElement('tr');
        const lo = g[1], hi = g[2] || g[1];
        const range = (mode === "GPA_4" || mode === "GPA_4_5") ? lo : (lo === hi ? lo : `${lo}–${hi}`);

        [g[0], range, g[3] || ""].forEach((txt, i) => {
          const td = document.createElement('td');
          td.textContent = txt;
          if (i === 1) td.className = 'accent';
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      }
      tbl.appendChild(tbody);
      rp.appendChild(tbl);

      // Hint
      const hint = getInputHint(info.scale) || LETTER_HINTS[info.scale] || '';
      if (hint) {
        const hintDiv = document.createElement('div');
        hintDiv.style.cssText = 'color:var(--info);font-size:10px;padding:8px 12px;border-top:1px solid var(--border);';
        hintDiv.textContent = 'Input: ' + hint;
        rp.appendChild(hintDiv);
      }

      const desc = document.createElement('div');
      desc.style.cssText = 'color:var(--fg-muted);font-size:10px;padding:6px 12px;';
      desc.textContent = info.description || '';
      rp.appendChild(desc);
      return;
    }
  }
  const hdr = document.createElement('div');
  hdr.className = 'panel-title';
  hdr.textContent = t('gwa_equivalency');
  rp.appendChild(hdr);
  const tbl = document.createElement('table');
  tbl.className = 'scale-table';
  const thead = document.createElement('thead');
  const hrow = document.createElement('tr');
  for (const h of [t('range'), t('gwa')]) { const th=document.createElement('th'); th.textContent=h; hrow.appendChild(th); }
  thead.appendChild(hrow); tbl.appendChild(thead);
  const tbody = document.createElement('tbody');
  for (const [rng,gwa] of GWA_TABLE) {
    const tr = document.createElement('tr');
    const td1 = document.createElement('td'); td1.textContent = rng;
    const td2 = document.createElement('td'); td2.textContent = gwa; td2.className='accent';
    tr.append(td1,td2); tbody.appendChild(tr);
  }
  tbl.appendChild(tbody); rp.appendChild(tbl);
}

function clearInputs() {
  document.getElementById('grade-input-content').innerHTML = '';
  state.entries = [];
  state.subjectsData = [];
  setResult("Enter grades then click Calculate", "var(--fg-muted)");
  document.getElementById('equiv-label').textContent = '';
}

function handleClearAll() {
  state.generated = false;
  clearInputs();
  document.getElementById('add-subj-btn').style.display='none';
  document.getElementById('rm-subj-btn').style.display='none';
}

function setResult(text, color) {
  const lbl = document.getElementById('result-label');
  lbl.textContent = text;
  lbl.style.color = color || 'var(--fg-muted)';
}

function handleGenerate() {
  clearInputs();
  state.generated = true;

  const sys = state.system;
  const gr = state.gradingSys;
  const typ = document.getElementById('type-select').value;
  state.calcType = typ;

  let sl = '';
  if (isCountrySystem(sys)) {
    sl = document.getElementById('school-level-select').value || state.schoolLevel;
    if (!sl && COUNTRY_SYSTEMS[sys] && COUNTRY_SYSTEMS[sys].levels) {
      sl = COUNTRY_SYSTEMS[sys].levels[0];
    }
  }
  state.schoolLevel = sl;

  state.gradeLevel = document.getElementById('grade-level-select').value;
  state.coreChoice = document.getElementById('core-select').value;
  state.electChoice = document.getElementById('elect-select').value || state.electChoice;

  if (typ === "Desired Grade") {
    document.getElementById('add-subj-btn').style.display = 'none';
    document.getElementById('rm-subj-btn').style.display = 'none';
    if (isCountrySystem(sys)) buildDesiredGradeCountryInputs();
    else buildDesiredGradeInputs();
    return;
  }

  if (sys === "Pisay" && typ === "Individual Subject & Quarter GWA") {
    document.getElementById('add-subj-btn').style.display = 'inline-block';
    document.getElementById('rm-subj-btn').style.display = 'inline-block';
    refreshPisayIndividualList();
    return;
  }

  document.getElementById('add-subj-btn').style.display = 'none';
  document.getElementById('rm-subj-btn').style.display = 'none';

  if (isCountrySystem(sys)) {
    generateCountryInputs(sys, sl, typ);
  } else {
    generateOriginalInputs(sys, gr, typ);
  }
}

function generateCountryInputs(sys, sl, typ) {
  if (!sl || sl === '—') {
    showInfo("Select a School Level first.");
    return;
  }

  const info = getCountryInfo(sys, sl);
  if (!info) {
    showInfo("Unknown system/level.");
    return;
  }

  const mode = info.grading_mode;
  const scale = info.scale;
  const hint = LETTER_HINTS[scale] || '';
  const n = Math.max(parseInt(document.getElementById('num-entry').value) || 1, 1);

  const f = document.getElementById('grade-input-content');
  state.entries = [];

  const hdr = document.createElement('div');
  hdr.className = 'gi-header-row';
  hdr.style.gridTemplateColumns = typ === "Subject" ? '3fr 2fr 1fr' : '3fr 2fr';
  hdr.innerHTML = typ === "Subject" 
    ? `<span>${t('subject_name')}</span><span style="text-align:center">${ui('grade')} [${hint}]</span><span style="text-align:center">${t('converted')}</span>`
    : `<span>${t('period_quarter')}</span><span style="text-align:center">${ui('grade')} [${hint}]</span>`;
  f.appendChild(hdr);

  // Description banner
  if (info.description) {
    const d2 = document.createElement('div');
    d2.className = 'desc-banner';
    d2.textContent = info.description;
    f.appendChild(d2);
  }

  const nav = [];

  for (let i = 0; i < n; i++) {
    const row = document.createElement('div');
    row.className = 'gi-data-row';
    row.style.gridTemplateColumns = typ === "Subject" ? '3fr 2fr 1fr' : '3fr 2fr';

    let col1;
    if (typ === "Subject") {
      col1 = makeEntry('160px', `Subject ${i+1}`);
    } else {
      col1 = document.createElement('span');
      col1.style.cssText = 'color:var(--fg-primary);font-size:13px;';
      col1.textContent = `Period ${i+1}:`;
    }

    const e = makeEntry('140px');

    if (typ === "Subject") {
      const conv = document.createElement('span');
      conv.className = 'gi-conv';
      conv.textContent = '—';

      function makeTrace(entry, label, sc, mo) {
        return function() {
          const raw = entry.value.trim();
          if (!raw) {
            label.textContent = '—';
            label.style.color = 'var(--fg-muted)';
            return;
          }
          try {
            const [numeric, letterUsed] = parseCountryEntry(raw, sc, mo);
            if (numeric !== null) {
              label.textContent = letterUsed ? '= ' + formatNumericForMode(numeric, mo) : '✓';
              label.style.color = 'var(--success)';
            } else {
              label.textContent = '?';
              label.style.color = 'var(--warning)';
            }
          } catch (err) {
            label.textContent = '✗';
            label.style.color = 'var(--danger)';
          }
        };
      }

      const trace = makeTrace(e, conv, scale, mode);
      e.addEventListener('keyup', trace);
      e.addEventListener('blur', trace);

      row.append(col1, e, conv);
      state.entries.push(e);
      nav.push(col1, e);
    } else {
      row.append(col1, e);
      state.entries.push(e);
      nav.push(e);
    }

    f.appendChild(row);
  }

  bindArrowNav(nav, typ === "Subject" ? 2 : 1);
}

function generateOriginalInputs(sys, gr, typ) {
  const f = document.getElementById('grade-input-content');
  f.innerHTML = '';
  state.entries = [];

  const n = Math.max(parseInt(document.getElementById('num-entry').value) || 1, 1);

  // Pisay special case (with units)
  if (sys === "Pisay" && typ === "Subject") {
    const gl = state.gradeLevel;
    const subjects = PISAY_DATA[gl] || [];
    const hdr = document.createElement('div');
    hdr.className = 'gi-header-row';
    hdr.style.gridTemplateColumns = '3fr 2fr 1fr';
    hdr.innerHTML = `<span style="text-align:left">${ui('subject')}</span><span style="text-align:center">${ui('grade')} (1.00–5.00)</span><span style="text-align:center">${ui('units')}</span>`;
    f.appendChild(hdr);

    const nav = [];
    for (const s of subjects) {
      let name = s.name;
      if (name === "Electives") name = `${state.electChoice} Elective`;
      if (name === "Core Science" || name === "Biology") name = `${state.coreChoice} Core`;

      const row = document.createElement('div');
      row.className = 'gi-data-row';
      row.style.gridTemplateColumns = '3fr 2fr 1fr';

      const lbl = document.createElement('span');
      lbl.style.cssText = 'color:var(--fg-primary);font-size:13px;display:flex;align-items:center;justify-content:flex-start;padding:0 8px;';
      lbl.textContent = name;

      const g = makeEntry('140px');
      const u = makeEntry('60px', String(s.units));

      row.append(lbl, g, u);
      f.appendChild(row);

      state.entries.push(g, u);
      nav.push(g, u);
    }
    bindArrowNav(nav, 2);
    return;
  }

  // Overall GWA mode - NO UNITS for Standard/Others
  if (typ === "Overall" && gr === "GWA") {
    const hdr = document.createElement('div');
    hdr.className = 'gi-header-row';
    hdr.style.gridTemplateColumns = '3fr 2fr';
    hdr.innerHTML = `<span>${t('subject')}</span><span style="text-align:center">${t('gwa')} (1.00–5.00)</span>`;
    f.appendChild(hdr);

    const labels = [
      "Previous Quarter Grade:",
      "Weight of Previous Grade:",
      `${ordinal(n)} Quarter Grade:`,
      "Weight of Current Grade:"
    ];
    const nav = [];
    for (let idx = 0; idx < labels.length; idx++) {
      const row = document.createElement('div');
      row.className = 'gi-data-row';
      row.style.gridTemplateColumns = '3fr 2fr';
      const lbl = document.createElement('span');
      lbl.style.cssText = 'color:var(--fg-primary);font-size:13px;';
      lbl.textContent = labels[idx];
      const e = makeEntry('160px');
      row.append(lbl, e);
      f.appendChild(row);
      state.entries.push(e);
      nav.push(e);
    }
    bindArrowNav(nav, 1);
    return;
  }

  // Overall Percentile mode - NO UNITS
  if (typ === "Overall" && gr === "Percentile") {
    const hdr = document.createElement('div');
    hdr.className = 'gi-header-row';
    hdr.style.gridTemplateColumns = '3fr 2fr';
    hdr.innerHTML = `<span>${t('quarter')}</span><span style="text-align:center">${ui('grade')} (%)</span>`;
    f.appendChild(hdr);

    const nav = [];
    for (let i = 0; i < n; i++) {
      const row = document.createElement('div');
      row.className = 'gi-data-row';
      row.style.gridTemplateColumns = '3fr 2fr';
      const lbl = document.createElement('span');
      lbl.style.cssText = 'color:var(--fg-primary);font-size:13px;';
      lbl.textContent = `Quarter ${i+1} Grade (%):`;
      const e = makeEntry('160px');
      row.append(lbl, e);
      f.appendChild(row);
      state.entries.push(e);
      nav.push(e);
    }
    bindArrowNav(nav, 1);
    return;
  }

  // Subject mode with editable subject names (for Standard, DepEd, Others)
  // Only Pisay Subject mode and GWA systems use units
  const gradeLabel = gr === "GWA" ? `${ui('grade')} (1.00–5.00)` : `${ui('grade')} (%)`;
  
  if (gr === "GWA" && sys !== "DepEd") {
    // GWA Subject mode WITH units (Standard, Others)
    const hdr = document.createElement('div');
    hdr.className = 'gi-header-row';
    hdr.style.gridTemplateColumns = '3fr 2fr 1fr';
    hdr.innerHTML = `<span style="text-align:left">${t('subject_name')}</span><span style="text-align:center">${gradeLabel}</span><span style="text-align:center">${ui('units')}</span>`;
    f.appendChild(hdr);

    const nav = [];
    for (let i = 0; i < n; i++) {
      const row = document.createElement('div');
      row.className = 'gi-data-row';
      row.style.gridTemplateColumns = '3fr 2fr 1fr';

      const subjectNameInput = makeEntry('160px', `Subject ${i + 1}`);
      const gradeInput = makeEntry('160px');
      const unitInput = makeEntry('80px', '1');

      row.append(subjectNameInput, gradeInput, unitInput);
      f.appendChild(row);

      state.entries.push(gradeInput, unitInput);  // ONLY push grade and unit inputs
      nav.push(subjectNameInput, gradeInput, unitInput);
    }
    bindArrowNav(nav, 3);
  } else {
    // Percentile Subject mode - NO UNITS
    const hdr = document.createElement('div');
    hdr.className = 'gi-header-row';
    hdr.style.gridTemplateColumns = '3fr 2fr';
    hdr.innerHTML = `<span style="text-align:left">${t('subject_name')}</span><span style="text-align:center">${gradeLabel}</span>`;
    f.appendChild(hdr);

    const nav = [];
    for (let i = 0; i < n; i++) {
      const row = document.createElement('div');
      row.className = 'gi-data-row';
      row.style.gridTemplateColumns = '3fr 2fr';

      const subjectNameInput = makeEntry('160px', `Subject ${i + 1}`);
      const gradeInput = makeEntry('160px');

      row.append(subjectNameInput, gradeInput);
      f.appendChild(row);

      state.entries.push(gradeInput);  // ONLY push grade input
      nav.push(subjectNameInput, gradeInput);
    }
    bindArrowNav(nav, 2);
  }
}

function buildDesiredGradeInputs() {
  const f=document.getElementById('grade-input-content');
  const gr=state.gradingSys;
  const isGwa=(gr==="GWA");
  state.entries=[];
  const banner=document.createElement('div');
  banner.className='info-banner';
  banner.textContent=isGwa?"GWA mode — enter GWA values (1.00–5.00)":"Percentile mode — enter % values (0–100)";
  f.appendChild(banner);
  const nav=[];
  function mk(row, labelTxt, placeholder) {
    const div=document.createElement('div');
    div.className='gi-data-row';
    div.style.gridTemplateColumns='3fr 2fr';
    const lbl=document.createElement('span');
    lbl.style.cssText='color:var(--fg-secondary);font-size:13px;';
    lbl.textContent=labelTxt;

    div.append(lbl,e); f.appendChild(div);
    state.entries.push(e); nav.push(e); return e;
  }
  state._dg_current=mk(0,"Current Grade"+(isGwa?" (GWA 1-5):":" (%):"),"");

  f.appendChild(note);
}

function buildDesiredGradeCountryInputs() {
  const f=document.getElementById('grade-input-content');

  const info=getCountryInfo(sys,sl);
  if (!info) { showInfo("Select a school level first."); return; }
  const mode=info.grading_mode, scale=info.scale, passing=info.passing;
  const hint=LETTER_HINTS[scale]||'';
  state.entries=[];
  const banner=document.createElement('div');
  banner.className='info-banner';
  banner.textContent=`${sys} — ${sl}  |  Passing: ${passing}  |  ${hint}`;
  f.appendChild(banner);
  const desc=document.createElement('div');
  desc.className='info-banner';
  desc.style.color='var(--fg-muted)';
  desc.textContent=info.description||'';
  f.appendChild(desc);
  state._country_dg_mode=mode; state._country_dg_scale=scale; state._country_dg_passing=passing;
  const nav=[];
  function mk(labelTxt) {
    const div=document.createElement('div');
    div.className='gi-data-row';
    div.style.gridTemplateColumns='3fr 2fr';
    const lbl=document.createElement('span');
    lbl.style.cssText='color:var(--fg-secondary);font-size:13px;';
    lbl.textContent=labelTxt;
    const e=makeEntry('160px');
    div.append(lbl,e); f.appendChild(div);
    state.entries.push(e); nav.push(e); return e;
  }
  state._dg_current=mk(`Current Grade (${hint}):`);
  state._dg_desired=mk(`Desired Final Grade (${hint}):`);
  state._dg_remain=mk("Remaining Assessment Weight (0.01–1.0 or %):");
  bindArrowNav(nav,1);
  const isGpa=mode==="GPA_4"||mode==="GPA_4_5";
  const isGcse=mode==="GCSE";
  const note=document.createElement('div');
  note.className='info-banner'; note.style.marginTop='16px';
  if(isGpa) note.textContent="GPA: higher is better (e.g. A=4.0). Enter letter or numeric.\nRemaining weight is fraction of overall grade (e.g. 0.4 = 40%).";
  else if(isGcse) note.textContent="GCSE: 9 is highest, U is ungraded (0). Passing = 4.\nRemaining weight is fraction of overall mark (e.g. 0.4 = 40%).";
  else note.textContent=`Percentage: higher is better. Passing = ${passing}%.\nRemaining weight is fraction of overall grade (e.g. 0.4 = 40%).\nYou may also enter letter grades (e.g. A, B+) instead of numbers.`;
  f.appendChild(note);
}

function refreshPisayIndividualList() {
  const f=document.getElementById('grade-input-content');
  f.innerHTML='';
  const gl=state.gradeLevel;
  const subjects=PISAY_DATA[gl]||[];
  if (!subjects.length) { showInfo("No subjects found for this grade level."); return; }
  const hdr=document.createElement('div');
  hdr.className='gi-header-row';
  hdr.style.gridTemplateColumns='3fr 1fr 1fr 1fr 2fr';
  hdr.innerHTML=`<span style="text-align:left">${ui('subject')}</span><span style="text-align:center">${t('gwa')} (1–5)</span><span style="text-align:center">% ${ui('value')}</span><span style="text-align:center">${ui('units')}</span><span style="text-align:center">${ui('status')}</span>`;
  f.appendChild(hdr);
  for (const s of subjects) {
    let dn=s.name;
    if(dn==="Electives") dn=`${state.electChoice} Elective`;
    if(dn==="Core Science"||dn==="Biology") dn=`${state.coreChoice} Core`;
    const existing=state.subjectsData.find(sd=>sd.name===dn);
    const row=document.createElement('div');
    row.className='gi-data-row';
    row.style.gridTemplateColumns='3fr 1fr 1fr 1fr 2fr';
    const btn=document.createElement('button');
    btn.className='pisay-btn'+(existing?' entered':'');
    btn.textContent=dn;
    btn.onclick=()=>openSubjectDialog(dn,s.units);
    row.appendChild(btn);
    if (existing) {
      const gwaVal=existing.gwa;
      const gwaNum=convertToGWA(gwaVal);
      const pctTxt=gwaVal.toFixed(2)+'%';
      const [,colorKey]=gwaStatus(gwaVal,state.system,"Percentile");
      const [,,fgC]=statusColors(colorKey);
      const [statusTxt]=gwaStatus(gwaVal,state.system,"Percentile");
      const gSpan=document.createElement('span');
      gSpan.style.cssText=`text-align:center;color:${fgC};font-weight:bold;`;
      gSpan.textContent=gwaNum;
      const pSpan=document.createElement('span');
      pSpan.style.cssText='text-align:center;color:var(--fg-secondary);font-size:10px;';
      pSpan.textContent=pctTxt;
      const uInp=document.createElement('input');
      uInp.type='number'; uInp.step='0.1'; uInp.min='0.1';
      uInp.style.cssText='background:var(--bg-input);color:var(--fg-primary);border:1px solid var(--border);border-radius:4px;padding:2px 4px;width:50px;font-size:12px;text-align:center;outline:none;';
      uInp.value=existing.units||s.units;
      uInp.onchange=()=>{ existing.units=parseFloat(uInp.value)||s.units; };
      const stSpan=document.createElement('span');
      stSpan.style.cssText=`text-align:center;color:${fgC};font-size:10px;`;
      stSpan.textContent=statusTxt;
      row.append(gSpan,pSpan,uInp,stSpan);
    } else {
      const spans=['—','—'];
      for(const t of spans){const sp=document.createElement('span');sp.style.cssText='text-align:center;color:var(--fg-muted);';sp.textContent=t;row.appendChild(sp);}
      const uSpan=document.createElement('span');
      uSpan.style.cssText='text-align:center;color:var(--fg-muted);';
      uSpan.textContent=String(s.units);
      row.appendChild(uSpan);
      const stSpan=document.createElement('span');
      stSpan.style.cssText='text-align:center;color:var(--fg-muted);font-size:10px;';
      stSpan.textContent='Not entered';
      row.appendChild(stSpan);
    }
    f.appendChild(row);
  }
}

function addPisaySubject() { refreshPisayIndividualList(); }
function rmPisaySubject() {
  if (state.subjectsData.length) { state.subjectsData.pop(); refreshPisayIndividualList(); }
}

function openSubjectDialog(displayName, defaultUnits) {
  showSubjectDialog(displayName, (resultPct) => {
    const existing=state.subjectsData.find(sd=>sd.name===displayName);
    if(existing) { existing.gwa=resultPct; }
    else { state.subjectsData.push({name:displayName,gwa:resultPct,units:defaultUnits}); }
    refreshPisayIndividualList();
  });
}
