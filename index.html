// ─────────────────────────────────────────────
function showSubjectDialog(subjectName, onConfirm) {
  const win=document.createElement('div');
  win.style.cssText='display:flex;flex-direction:column;width:100%;';

  const body=document.createElement('div');
  body.className='modal-body subdialog';
  body.style.cssText='background:var(--bg-surface);padding:12px;';

  function makeSec(title) {
    const s=document.createElement('div');
    s.className='sub-sec';
    const t=document.createElement('div');
    t.className='sub-sec-title'; t.textContent=title;
    s.appendChild(t); body.appendChild(s); return s;
  }
  function makeRow(parent, label, inputEl) {
    const r=document.createElement('div');
    r.className='sub-row';
    const l=document.createElement('span');
    l.className='sub-label'; l.textContent=label;
    r.append(l,inputEl); parent.appendChild(r); return r;
  }
  function makeSEntry(w='80px',def='') {
    const e=document.createElement('input');
    e.type='text'; e.className='sub-entry';
    e.style.width=w; if(def) e.value=def;
    return e;
  }

  const allEntries=[];

  // FA
  const faS=makeSec("Formative Assessments (max 10)");
  const faCount=document.createElement('input');
  faCount.type='number'; faCount.min=0; faCount.max=10; faCount.value=0;
  faCount.className='sub-entry'; faCount.style.width='60px';
  const faWeight=makeSEntry('60px','0');
  const faGrades=makeSEntry('220px','');
  makeRow(faS,"Count (0–10):",faCount);
  makeRow(faS,"Weight (%):",faWeight);
  makeRow(faS,"Grades (comma-sep):",faGrades);
  allEntries.push(faWeight,faGrades);

  // AA
  const aaS=makeSec("Alternative Assessments (max 7)");
  const aaCount=document.createElement('input');
  aaCount.type='number'; aaCount.min=0; aaCount.max=7; aaCount.value=0;
  aaCount.className='sub-entry'; aaCount.style.width='60px';
  const aaWeight=makeSEntry('60px','0');
  const aaGrades=makeSEntry('220px','');
  makeRow(aaS,"Count (0–7):",aaCount);
  makeRow(aaS,"Weight (%):",aaWeight);
  makeRow(aaS,"Grades (comma-sep):",aaGrades);
  allEntries.push(aaWeight,aaGrades);

  // LT
  const ltS=makeSec("Long Test (optional)");
  const ltTake=document.createElement('input'); ltTake.type='checkbox';
  const ltCB=document.createElement('label'); ltCB.className='cb-row'; ltCB.append(ltTake,"Took Long Test");
  ltS.appendChild(ltCB);
  const ltWeight=makeSEntry('60px','0');
  const ltGrades=makeSEntry('220px','');
  makeRow(ltS,"Weight (%):",ltWeight);
  makeRow(ltS,"Grades (comma-sep):",ltGrades);
  allEntries.push(ltWeight,ltGrades);

  // PR
  const prS=makeSec("Practical Exam (optional)");
  const prTake=document.createElement('input'); prTake.type='checkbox';
  const prCB=document.createElement('label'); prCB.className='cb-row'; prCB.append(prTake,"Took Practical Exam");
  prS.appendChild(prCB);
  const prWeight=makeSEntry('60px','0');
  const prGrades=makeSEntry('220px','');
  makeRow(prS,"Weight (%):",prWeight);
  makeRow(prS,"Grades (comma-sep):",prGrades);
  allEntries.push(prWeight,prGrades);

  // MT
  const mtS=makeSec("Midterm (optional)");
  const mtTake=document.createElement('input'); mtTake.type='checkbox';
  const mtCB=document.createElement('label'); mtCB.className='cb-row'; mtCB.append(mtTake,"Took Midterm");
  mtS.appendChild(mtCB);
  const mtWeight=makeSEntry('60px','0');
  const mtGrades=makeSEntry('220px','');
  makeRow(mtS,"Weight (%):",mtWeight);
  makeRow(mtS,"Grades (comma-sep):",mtGrades);
  allEntries.push(mtWeight,mtGrades);

  // FE
  const feS=makeSec("Final Exam (optional)");
  const feTake=document.createElement('input'); feTake.type='checkbox';
  const feCB=document.createElement('label'); feCB.className='cb-row'; feCB.append(feTake,"Took Final Exam");
  feS.appendChild(feCB);
  const feWeight=makeSEntry('60px','0');
  const feGrade=makeSEntry('80px','0');
  makeRow(feS,"Weight (%):",feWeight);
  makeRow(feS,"Score (0–100 %):",feGrade);
  allEntries.push(feWeight,feGrade);

  // Bonus
  const bonS=makeSec("Bonus Points (0–5)");
  const bonus=makeSEntry('60px','0');
  makeRow(bonS,"Bonus:",bonus);
  allEntries.push(bonus);

  bindArrowNav(allEntries,1);

  // Result area
  const resultDiv=document.createElement('div');
  resultDiv.className='sub-result';
  resultDiv.style.color='var(--fg-muted)';
  body.appendChild(resultDiv);

  // Calc button
  const calcBtn=document.createElement('button');
  calcBtn.className='btn btn-primary';
  calcBtn.style.cssText='width:100%;padding:10px;margin-top:8px;';
  calcBtn.textContent='Calculate Subject GWA';

  let computedPct=null;

  function parseValue(raw, lbl, minV=0, maxV=100) {
    raw=raw.trim();
    if(!raw) throw new Error(`Empty value for ${lbl}.`);
    let v;
    if(raw.includes('/')) { const [a,b]=raw.split('/'); const n=parseFloat(a),d=parseFloat(b); if(d===0)throw new Error(`Division by zero in '${raw}' for ${lbl}.`); v=(n/d)*100; }
    else if(raw.endsWith('%')) { v=parseFloat(raw); }
    else { v=parseFraction(raw); }
    if(v<minV||v>maxV) throw new Error(`Value ${v.toFixed(2)} out of range [${minV}–${maxV}] for ${lbl}.`);
    return v;
  }
  function parseGrades(w, lbl) {
    const raw=w.value.trim();
    if(!raw) return [];
    return raw.split(',').filter(t=>t.trim()).map(t=>parseValue(t.trim(),lbl));
  }
  function parseWeight(w, lbl) { return parseValue(w.value.trim(),lbl,0,100); }
  function calcSec(grades, weight) {
    if(!grades.length||weight===0) return 0;
    return (grades.reduce((a,b)=>a+b,0)/grades.length)*(weight/100);
  }

  calcBtn.onclick=()=>{
    try {
      let tc=0, tw=0;
      const fan=parseInt(faCount.value)||0;
      if(fan>0) {
        const fw=parseWeight(faWeight,"Formative");
        const fg=parseGrades(faGrades,"Formative");
        if(fg.length!==fan) throw new Error(`Expected ${fan} Formative grade(s), got ${fg.length}.`);
        tc+=calcSec(fg,fw); tw+=fw;
      }
      const aan=parseInt(aaCount.value)||0;
      if(aan>0) {
        const aw=parseWeight(aaWeight,"Alternative");
        const ag=parseGrades(aaGrades,"Alternative");
        if(ag.length!==aan) throw new Error(`Expected ${aan} Alternative grade(s), got ${ag.length}.`);
        tc+=calcSec(ag,aw); tw+=aw;
      }
      if(ltTake.checked) {
        const lw=parseWeight(ltWeight,"Long Test");
        const lg=parseGrades(ltGrades,"Long Test");
        if(!lg.length) throw new Error("Enter at least one Long Test grade.");
        tc+=calcSec(lg,lw); tw+=lw;
      }
      if(prTake.checked) {
        const pw=parseWeight(prWeight,"Practical Exam");
        const pg=parseGrades(prGrades,"Practical Exam");
        if(!pg.length) throw new Error("Enter at least one Practical Exam grade.");
        tc+=calcSec(pg,pw); tw+=pw;
      }
      if(mtTake.checked) {
        const mw=parseWeight(mtWeight,"Midterm");
        const mg=parseGrades(mtGrades,"Midterm");
        if(!mg.length) throw new Error("Enter at least one Midterm grade.");
        tc+=calcSec(mg,mw); tw+=mw;
      }
      if(feTake.checked) {
        const fw2=parseWeight(feWeight,"Final Exam");
        const fg2=parseValue(feGrade.value.trim(),"Final Exam Score");
        tc+=fg2*(fw2/100); tw+=fw2;
      }
      const bon=Math.min(Math.max(parseFloat(bonus.value)||0,0),5);
      tc+=bon;
      if(tw===0) throw new Error("No assessments entered.");
      const pct=Math.min((tc/tw)*100,100.0);
      computedPct=pct;
      const gwaStr=convertToGWA(pct);
      const [statusTxt,colorKey]=gwaStatus(pct,state.system,"Percentile");
      const [,,fgC]=statusColors(colorKey);
      resultDiv.textContent=`GWA: ${gwaStr}  (${pct.toFixed(2)}%)  |  ${statusTxt}`;
      resultDiv.style.color=fgC;
      confirmBtn.style.display='block';
    } catch(e) { alertMsg(e.message); }
  };
  body.appendChild(calcBtn);

  const confirmBtn=document.createElement('button');
  confirmBtn.className='btn btn-success';
  confirmBtn.style.cssText='width:100%;padding:10px;margin-top:8px;display:none;';
  confirmBtn.textContent='Save & Close';
  confirmBtn.onclick=()=>{
    if(computedPct!==null) { onConfirm(computedPct); closeModal(); }
  };
  body.appendChild(confirmBtn);

  const hdrEl=document.createElement('div');
  hdrEl.className='modal-header';
  hdrEl.innerHTML=`<span>Subject — ${subjectName}</span><button class="btn btn-ghost btn-sm" onclick="closeModal()">X</button>`;
  win.append(hdrEl,body);
  showModal(win,'subdialog');
}

// ─────────────────────────────────────────────
//  CALCULATE
// ─────────────────────────────────────────────
function handleCalculate() {
  if (!state.generated) { setResult("Generate inputs first", "var(--warning)"); return; }
  const sys=state.system;
  const gr=state.gradingSys;
  const typ=state.calcType;
  const sl=state.schoolLevel;

  if (typ==="Desired Grade") {
    if (isCountrySystem(sys)) calculateDesiredCountry();
    else calculateDesiredOriginal(sys,gr);
    return;
  }

  if (sys==="Pisay" && typ==="Individual Subject & Quarter GWA") {
    if (!state.subjectsData.length) { setResult("Add at least one subject","var(--warning)"); return; }
    let totalW=0, totalU=0;
    for (const sd of state.subjectsData) {
      const gwaS=convertToGWA(sd.gwa);
      const gwaF=parseFloat(gwaS.split(' ')[0]);
      const units=parseFloat(sd.units||1);
      totalW+=gwaF*units; totalU+=units;
    }
    if(!totalU) { setResult("No units found","var(--warning)"); return; }
    const overall=totalW/totalU;
    const [statusTxt,colorKey]=gwaStatus(overall,sys,"GWA");
    const [,,fgC]=statusColors(colorKey);
    setResult(`Overall GWA: ${overall.toFixed(4)}  ${statusTxt}`,fgC);
    document.getElementById('equiv-label').textContent=`(${totalU.toFixed(1)} total units)`;
    return;
  }

  if (isCountrySystem(sys)) {
    if (!state.entries.length) { setResult("No entries found","var(--warning)"); return; }
    try {
      const info=getCountryInfo(sys,sl);
      if(!info) throw new Error("Select a school level first.");
      const mode=info.grading_mode, scale=info.scale;
      const values=[];
      for (const e of state.entries) {
        const raw=e.value.trim();
        if(!raw) continue;
        const [numeric]=parseCountryEntry(raw,scale,mode);
        if(numeric===null) throw new Error(`Invalid value '${raw}'.`);
        values.push(numeric);
      }
      if(!values.length) throw new Error("No grades entered.");
      const avg=values.reduce((a,b)=>a+b,0)/values.length;
      const [statusTxt,colorKey]=countryStatus(avg,sys,sl);
      const [,,fgC]=statusColors(colorKey);
      const gLbl=countryGradeLabel(avg,sys,sl);
      const gpaEq=countryGpaEquivalent(avg,sys,sl);
      let display;
      if(mode==="GPA_4"||mode==="GPA_4_5") display=`Average: ${avg.toFixed(3)}`;
      else if(mode==="GCSE") display=`Average: ${avg.toFixed(2)}`;
      else display=`Average: ${avg.toFixed(2)}%`;
      if(gLbl) display+=`  [${gLbl}]`;
      display+=`  ${statusTxt}`;
      setResult(display,fgC);
      document.getElementById('equiv-label').textContent=gpaEq?`GPA/Equiv: ${gpaEq}`:'';
    } catch(e) { setResult(`${e.message}`,"var(--warning)"); document.getElementById('equiv-label').textContent=''; }
    return;
  }

  try {
    const entryVals=state.entries.map(e=>e.value);
    const [resultStr,resultVal]=computeResult(entryVals,sys,gr,typ);
    if(gr==="GWA") {
      const [statusTxt,colorKey]=gwaStatus(resultVal,sys,"GWA");
      const [,,fgC]=statusColors(colorKey);
      setResult(`${resultStr}  ${statusTxt}`,fgC);
      document.getElementById('equiv-label').textContent='';
    } else {
      const [statusTxt,colorKey]=gwaStatus(resultVal,sys,"Percentile");
      const [,,fgC]=statusColors(colorKey);
      const equiv=convertToGWA(resultVal);
      setResult(`${resultStr}  ${statusTxt}`,fgC);
      document.getElementById('equiv-label').textContent=`GWA Equiv: ${equiv}`;
    }
  } catch(e) {
    setResult("Invalid input — check your values","var(--warning)");
    document.getElementById('equiv-label').textContent='';
  }
}

function calculateDesiredOriginal(sys,gr) {
  try {
    const isGwa=(gr==="GWA");
    const curStr=state._dg_current.value.trim();
    const desStr=state._dg_desired.value.trim();
    const remStr=(state._dg_remain&&state._dg_remain.value)||'';
    if(!curStr||!desStr) throw new Error("Enter both current and desired grades.");
    if(!remStr) throw new Error("Enter remaining assessment weight.");
    const cur=toNum(curStr,isGwa);
    const des=toNum(desStr,isGwa);
    const rem=toNum(remStr);
    if(cur===null) throw new Error("Invalid current grade.");
    if(des===null) throw new Error("Invalid desired grade.");
    if(rem===null||rem<=0||rem>1) throw new Error("Remaining weight must be 0.01–1.00 (or 1%–100%).");
    if(isGwa) {
      const needed=(des-cur*(1.0-rem))/rem;
      if(needed<1.0) { setResult("You have already surpassed your desired GWA!","var(--success)"); }
      else if(needed>5.0) { setResult("Not achievable — required GWA exceeds 5.00.","var(--danger)"); }
      else { setResult(`You need GWA ${needed.toFixed(3)} on the remaining assessments.`,"var(--info)"); }
    } else {
      const needed=(des-cur*(1.0-rem))/rem;
      const neededPct=needed*100;
      if(neededPct<0) { setResult("You have already surpassed your desired grade!","var(--success)"); }
      else if(neededPct>100) { setResult("Not achievable — required score exceeds 100%.","var(--danger)"); }
      else { setResult(`You need ${neededPct.toFixed(2)}% on the remaining assessments.`,"var(--info)"); }
    }
    document.getElementById('equiv-label').textContent='';
  } catch(e) { setResult(e.message,"var(--warning)"); }
}

function calculateDesiredCountry() {
  try {
    const sys=state.system, sl=state.schoolLevel;
    const mode=state._country_dg_mode||'Percentage';
    const scale=state._country_dg_scale||'';
    const passing=state._country_dg_passing||60;
    const curStr=state._dg_current.value.trim();
    const desStr=state._dg_desired.value.trim();
    const remStr=(state._dg_remain&&state._dg_remain.value)||'';
    if(!curStr||!desStr) throw new Error("Enter both current and desired grades.");
    if(!remStr) throw new Error("Enter remaining assessment weight.");
    const [cur]=parseCountryEntry(curStr,scale,mode);
    const [des]=parseCountryEntry(desStr,scale,mode);
    if(cur===null) throw new Error(`Invalid current grade. ${LETTER_HINTS[scale]||''}`);
    if(des===null) throw new Error(`Invalid desired grade. ${LETTER_HINTS[scale]||''}`);
    let rem;
    if(remStr.endsWith('%')) rem=parseFloat(remStr)/100;
    else { const rf=parseFraction(remStr); rem=rf<=1.0?rf:rf/100; }
    if(!rem||rem<=0||rem>1) throw new Error("Remaining weight must be 0.01–1.00 (or 1%–100%).");
    const scaleMax=mode==="GPA_4"?4.0:mode==="GPA_4_5"?4.5:mode==="GCSE"?9.0:100.0;
    const needed=(des-cur*(1.0-rem))/rem;
    const clamped=Math.max(Math.min(needed,scaleMax),0);
    const gLbl=(needed>=0&&needed<=scaleMax)?countryGradeLabel(clamped,sys,sl):"";
    if(needed>scaleMax) { setResult(`Not achievable — required (${needed.toFixed(2)}) exceeds max (${scaleMax}).`,"var(--danger)"); }
    else if(needed<0) { setResult("You have already surpassed your desired grade!","var(--success)"); }
    else {
      const gp=gLbl?` [${gLbl}]`:"";
      let msg;
      if(mode==="GPA_4"||mode==="GPA_4_5") msg=`You need ${needed.toFixed(3)}${gp} GPA on the remaining assessments.`;
      else if(mode==="GCSE") msg=`You need band ${needed.toFixed(2)}${gp} on the remaining assessments.`;
      else msg=`You need ${needed.toFixed(2)}%${gp} on the remaining assessments.`;
      setResult(msg,"var(--info)");
    }
    document.getElementById('equiv-label').textContent='';
  } catch(e) { setResult(e.message,"var(--warning)"); }
}

function handleSave() {
  if (!state.generated) { alertMsg(t('generate_first')); return; }
  promptMsg(t('enter_name'), async (fileName) => {
    if (!fileName) return;
    const all=await dbLoadAll();
    const existing=all.find(r=>r.file_name===fileName);
  if(existing) {
        confirmMsg(`'${fileName}' ${t('already_exists')}`, ()=>doSave(fileName));
    } else { doSave(fileName); }
  });
}

async function doSave(fileName) {
  const sys=state.system, typ=state.calcType, sl=state.schoolLevel;
  let entryVals;
  if(sys==="Pisay" && typ==="Individual Subject & Quarter GWA") {
    entryVals=state.subjectsData.map(s=>String(s.gwa));
  } else {
    entryVals=state.entries.map(e=>e.value);
  }
  const record={
    file_name:fileName,
    student_id:document.getElementById('stu-id').value.trim(),
    student_name:document.getElementById('stu-name').value.trim(),
    grade_level:document.getElementById('stu-grade').value.trim(),
    section:document.getElementById('stu-section').value.trim(),
    quarter:document.getElementById('stu-quarter').value,
    system:sys,
    pisay_grade_level:state.gradeLevel,
    grading:state.gradingSys,
    type:typ,
    number:document.getElementById('num-entry').value,
    core_choice:state.coreChoice,
    elective_choice:state.electChoice,
    entries:entryVals,
    subjects:typ==="Individual Subject & Quarter GWA"?[...state.subjectsData]:[],
    overall_gwa:0.0,
    school_level:sl
  };
  try {
    if(isCountrySystem(sys)&&entryVals.length&&typ!=="Desired Grade") {
      const info=getCountryInfo(sys,sl);
      if(info){
        const mode=info.grading_mode,scale=info.scale;
        const vals=[];
        for(const v of entryVals){try{const[n]=parseCountryEntry(v,scale,mode);if(n!==null)vals.push(n);}catch{}}
        if(vals.length) record.overall_gwa=vals.reduce((a,b)=>a+b,0)/vals.length;
      }
    } else if(sys==="Pisay"&&typ==="Individual Subject & Quarter GWA"&&state.subjectsData.length) {
      record.overall_gwa=capVal(state.subjectsData.reduce((a,s)=>a+s.gwa,0)/state.subjectsData.length);
    } else if(typ!=="Desired Grade") {
      const [,val]=computeResult(entryVals,sys,state.gradingSys,typ);
      record.overall_gwa=val;
    }
  } catch {}
  await dbSave(record);
  alertMsg(`${t('saved_as')} '${fileName}'<br>${t('student')}: ${record.student_name||'—'} (${record.student_id||'—'})`);
}

// ─────────────────────────────────────────────
// DETAIL WINDOW (Fully Translated)
// ─────────────────────────────────────────────
function showDetailWindow(rec) {
  const win=document.createElement('div');
  win.style.cssText='display:flex;flex-direction:column;width:560px;max-width:98vw;';
  const hdr=document.createElement('div');
  hdr.className='modal-header';
  hdr.innerHTML=`<span>${rec.file_name}</span><button class="btn btn-ghost btn-sm" onclick="closeModal()">X</button>`;
  const body=document.createElement('div');
  body.style.cssText='flex:1;overflow-y:auto;max-height:65vh;padding:0;background:var(--bg-surface);';

  const sys=rec.system||'', grading=rec.grading||'', typ=rec.type||'', sl=rec.school_level||'';

  const fields=[
    [t('student') + ":", rec.student_name||'—'],
    [t('student_id') + ":", rec.student_id||'—'],
    [t('grade_level') + ":", rec.grade_level||'—'],
    [t('section') + ":", rec.section||'—'],
    [t('quarter') + ":", rec.quarter||'—'],
    [t('system') + ":", sys],
  ];
  if(sl) fields.push([t('school_level') + ":", sl]);
  fields.push([t('grading') + ":", grading],[t('type') + ":", typ]);

  for (const [k, v] of fields) {
    const row = document.createElement('div');
    row.className = 'detail-row';
    const dk = document.createElement('div');
    dk.className = 'detail-key';
    dk.textContent = k;
    const dv = document.createElement('div');
    dv.className = 'detail-val';
    dv.textContent = v;
    row.append(dk, dv);
    body.appendChild(row);
  }

  // Subjects for Pisay Individual mode
  if (rec.subjects && rec.subjects.length && typ === "Individual Subject & Quarter GWA") {
    const shdr = document.createElement('div');
    shdr.style.cssText = 'background:var(--bg-card2);color:var(--accent2);font-size:13px;font-weight:bold;padding:8px;';
    shdr.textContent = ui('subject');   // or t('subjects') if you prefer
    body.appendChild(shdr);

    for (const s of rec.subjects) {
      const [statusTxt, colorKey] = gwaStatus(s.gwa, sys, "Percentile");
      const [,, fgC] = statusColors(colorKey);

      const row = document.createElement('div');
      row.className = 'detail-row';

      const dk = document.createElement('div');
      dk.className = 'detail-key';
      dk.textContent = s.name;

      const dv = document.createElement('div');
      dv.className = 'detail-val';
      dv.style.color = fgC;

      const gwaEq = convertToGWA(s.gwa);
      const unitsT = s.units ? ` (${ui('units')}: ${s.units})` : '';

      dv.textContent = `GWA ${gwaEq} (${s.gwa.toFixed(2)}%) ${statusTxt}${unitsT}`;
      row.append(dk, dv);
      body.appendChild(row);
    }
  } 
  // Normal entries
  else if (rec.entries && rec.entries.length) {
    const ehdr = document.createElement('div');
    ehdr.style.cssText = 'background:var(--bg-card2);color:var(--accent2);font-size:13px;font-weight:bold;padding:8px;';
    ehdr.textContent = t('entries');
    body.appendChild(ehdr);

    for (const [j, val] of rec.entries.entries()) {
      const row = document.createElement('div');
      row.className = 'detail-row';

      const dk = document.createElement('div');
      dk.className = 'detail-key';
      dk.textContent = `${t('entry')} ${j+1}:`;

      const dv = document.createElement('div');
      dv.className = 'detail-val';
      dv.style.color = 'var(--accent2)';
      dv.textContent = String(val);

      row.append(dk, dv);
      body.appendChild(row);
    }
  }

  // Overall Result
  const overall = rec.overall_gwa || 0;
  if (overall && overall > 0) {
    let statusTxt, colorKey;
    if (isCountrySystem(sys) && sl) {
      [statusTxt, colorKey] = countryStatus(overall, sys, sl);
    } else if (grading === "GWA") {
      [statusTxt, colorKey] = gwaStatus(overall, sys, "GWA");
    } else {
      [statusTxt, colorKey] = gwaStatus(overall, sys, "Percentile");
    }

    const [resBg, resFg] = statusColors(colorKey);
    const resBox = document.createElement('div');
    resBox.style.cssText = `background:${resBg};color:${resFg};padding:12px;text-align:center;font-size:16px;font-weight:bold;margin-top:4px;`;
    resBox.textContent=`${t('result')}: ${overall.toFixed(4)}  •  ${statusTxt}`;
    body.appendChild(resBox);
  }

  const footer = document.createElement('div');
  footer.className = 'modal-footer';
  const closeB = document.createElement('button');
  closeB.className = 'btn btn-ghost';
  closeB.textContent = t('close');
  closeB.onclick = closeModal;
  footer.appendChild(closeB);

  win.append(hdr, body, footer);
  showModal(win);
}

}

// ─────────────────────────────────────────────

function showSplitViewWindow(savedRecord) {
  const rec=savedRecord;
  const sys=rec.system||'Standard', grading=rec.grading||'Percentile';
  const typ=rec.type||'Subject', sl=rec.school_level||'';
  const leftEntries=[];
  let leftDgCurrent=null, leftDgDesired=null, leftDgRemain=null;
  let leftCountryDgMode='', leftCountryDgScale='', leftCountryDgPassing=60;

  const win=document.createElement('div');
  win.style.cssText='display:flex;flex-direction:column;width:100%;height:100%;';
 const hdr=document.createElement('div');
  hdr.className='modal-header';
  const tags=[sys,sl,typ,grading].filter(Boolean).join('  ·  ');
  hdr.innerHTML=`<div><span>${t('split_view')} — ${rec.file_name}</span><span style="color:rgba(255,255,255,.6);font-size:10px;margin-left:12px;">${tags}</span></div><button class="btn btn-ghost btn-sm" onclick="closeModal()">X</button>`;
  const body=document.createElement('div');
  body.style.cssText='flex:1;display:flex;flex-direction:column;padding:8px;gap:8px;background:var(--bg-surface);overflow:hidden;';

  const panels=document.createElement('div');
  panels.style.cssText='display:flex;gap:8px;flex:1;min-height:0;height:560px;';

  // LEFT PANEL
  const leftPanel=document.createElement('div');
  leftPanel.style.cssText='flex:1;display:flex;flex-direction:column;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;overflow:hidden;';
  const leftHdr=document.createElement('div');
  leftHdr.style.cssText='background:var(--accent);color:#fff;font-size:13px;font-weight:bold;padding:8px 12px;flex-shrink:0;';
  leftHdr.textContent=t('new_calculation');
  const leftBody=document.createElement('div');
  leftBody.style.cssText='flex:1;overflow-y:auto;padding:8px;';
  const leftFooter=document.createElement('div');
  leftFooter.style.cssText='padding:8px 12px;background:var(--bg-card);border-top:1px solid var(--border);flex-shrink:0;';
  const leftResultLbl=document.createElement('div');
  leftResultLbl.style.cssText='color:var(--fg-muted);font-size:14px;font-weight:bold;padding:4px 8px;margin-top:4px;';

  // Build left panel content
  function buildLeftPanel() {
    leftBody.innerHTML=''; leftEntries.length=0;
    // LEFT panel is for NEW calculation - empty inputs
    const savedEntries = [];
    const info=isCountrySystem(sys)?getCountryInfo(sys,sl):null;
    const mode=info?info.grading_mode:'Percentage';
    const scale=info?info.scale:'';
    const hint=LETTER_HINTS[scale]||'';

    const banner=document.createElement('div');
    banner.className='info-banner';
    banner.textContent=`System: ${sys}  |  Type: ${typ}  |  Grading: ${grading}${sl?' | Level: '+sl:''}${hint?' | '+hint:''}`;
    leftBody.appendChild(banner);

    const ec={background:'var(--bg-input)',color:'var(--fg-primary)',border:'1px solid var(--border)',borderRadius:'4px',padding:'4px 8px',fontFamily:'inherit',fontSize:'13px',outline:'none',width:'130px'};
    function mke(def='') {
      const e=document.createElement('input'); e.type='text';
      Object.assign(e.style,ec); if(def) e.value=def;
      return e;
    }

    if (typ==="Desired Grade") {
      const nav=[];
      function mkR(lbl, prefill='') {
        const div=document.createElement('div');
        div.style.cssText='display:flex;align-items:center;gap:8px;padding:5px 8px;';
        const l=document.createElement('span'); l.style.cssText='color:var(--fg-secondary);font-size:13px;min-width:180px;'; l.textContent=lbl;
        const e=mke(prefill); div.append(l,e); leftBody.appendChild(div); nav.push(e); return e;
      }
      if(isCountrySystem(sys)&&sl) {
        const infoD=getCountryInfo(sys,sl);
        const modeD=infoD?infoD.grading_mode:'Percentage';
        const scaleD=infoD?infoD.scale:'';
        const hintD=LETTER_HINTS[scaleD]||'';
        leftCountryDgMode=modeD; leftCountryDgScale=scaleD; leftCountryDgPassing=infoD?infoD.passing:60;
        leftDgCurrent=mkR(`Current Grade (${hintD}):`, '');
        leftDgDesired=mkR(`Desired Grade (${hintD}):`, '');
        leftDgRemain=mkR("Remaining Weight (0.01–1.0 or %):", '');
        const isGwa=(grading==="GWA");
        const sfx=isGwa?" (GWA 1-5):":" (%):";
        leftDgCurrent=mkR(`Current Grade${sfx}`, '');
        leftDgDesired=mkR(`Desired Grade${sfx}`, '');
        leftDgRemain=mkR("Remaining Weight (0.01–1.0 or %):", '');
      }
      bindArrowNav(nav,1); return;
    }

    if(isCountrySystem(sys)&&sl) {
      let n=Math.max(parseInt(rec.number||1)||1,1);
      const lbPfx=typ==="Subject"?"Subject":"Period";
      const hdrRow=document.createElement('div');
      hdrRow.style.cssText='display:grid;grid-template-columns:3fr 2fr 1fr;background:var(--bg-card2);padding:6px 8px;font-size:13px;font-weight:bold;color:var(--accent2);';   
      hdrRow.innerHTML=`<span>${ui('subject')}</span><span style="text-align:center">${isGwa?`${ui('grade')} (1–5)`:`${ui('grade')} (%)`}</span>${isGwa?`<span style="text-align:center">${ui('units')}</span>`:''}`;
      leftBody.appendChild(hdrRow);
      const nav=[];
      for(let i=0;i<n;i++) {
        const row=document.createElement('div');
        row.style.cssText=`display:grid;grid-template-columns:3fr 2fr 1fr;padding:5px 8px;align-items:center;background:${i%2===0?'var(--bg-card)':'var(--bg-card2)'};`;
        const lbl=document.createElement('span'); lbl.style.color='var(--fg-primary)'; lbl.textContent=`${lbPfx} ${i+1}:`;
        const e=mke('');
        const conv=document.createElement('span'); conv.style.cssText='text-align:center;font-size:10px;color:var(--fg-muted);'; conv.textContent='—';
        function makeT(entry,label,sc,mo) {
          return function(){
            const raw=entry.value.trim();
            if(!raw){label.textContent='—';label.style.color='var(--fg-muted)';return;}
            try{const[num,lu]=parseCountryEntry(raw,sc,mo);if(num!==null){label.textContent=lu?'= '+formatNumericForMode(num,mo):'✓';label.style.color='var(--success)';}else{label.textContent='?';label.style.color='var(--warning)';}}catch{label.textContent='✗';label.style.color='var(--danger)';}
          };
        }
        const t=makeT(e,conv,scale,mode);
        e.addEventListener('keyup',t); e.addEventListener('blur',t);
        // trigger conversion display for pre-filled value
        if(e.value) setTimeout(t,0);
        row.append(lbl,e,conv); leftBody.appendChild(row);
        leftEntries.push(e); nav.push(e);
      }
      bindArrowNav(nav,1); return;
    }

    if(sys==="Pisay"&&typ==="Subject") {
      const gl=rec.pisay_grade_level||'11';
      const subjects=PISAY_DATA[gl]||[];
      const core=rec.core_choice||'Biology'; const elect=rec.elective_choice||'Technology';
      const hdrRow=document.createElement('div');
      hdrRow.style.cssText='display:grid;grid-template-columns:3fr 2fr 1fr;background:var(--bg-card2);padding:6px 8px;font-size:13px;font-weight:bold;color:var(--accent2);';
      hdrRow.innerHTML=`<span style="text-align:left">${ui('subject')}</span><span style="text-align:center">GWA (1–5)</span><span style="text-align:center">${ui('units')}</span>`;
      leftBody.appendChild(hdrRow);
      const nav=[];
      for(const [i,s] of subjects.entries()) {
        let name=s.name;
        if(name==="Electives") name=`${elect} Elective`;
        if(name==="Core Science"||name==="Biology") name=`${core} Core`;
        const row=document.createElement('div');
        row.style.cssText=`display:grid;grid-template-columns:3fr 2fr 1fr;padding:5px 8px;align-items:center;background:${i%2===0?'var(--bg-card)':'var(--bg-card2)'};`;
        const lbl=document.createElement('span'); lbl.style.color='var(--fg-primary)'; lbl.textContent=name;
        // savedEntries for Pisay Subject are stored in pairs: [grade0, units0, grade1, units1, ...]
        const g=mke('');
        const u=mke(String(s.units));
        row.append(lbl,g,u); leftBody.appendChild(row);
        leftEntries.push(g,u); nav.push(g,u);
      }
      bindArrowNav(nav,2); return;
    }

    if(typ==="Subject") {
      let n=Math.max(parseInt(rec.number||1)||1,1);
      const isGwa=grading==="GWA";
      const cols=isGwa?'3fr 2fr 1fr':'3fr 2fr';
      const hdrRow=document.createElement('div');
      hdrRow.style.cssText=`display:grid;grid-template-columns:${cols};background:var(--bg-card2);padding:6px 8px;font-size:13px;font-weight:bold;color:var(--accent2);`;
      hdrRow.innerHTML = `<span>${ui('subject')}</span><span style="text-align:center">${ui('grade')} (1–5)</span><span style="text-align:center">${ui('units')}</span>`;
      leftBody.appendChild(hdrRow);
      const nav=[];
      for(let i=0;i<n;i++) {
        const row=document.createElement('div');
        row.style.cssText=`display:grid;grid-template-columns:${cols};padding:5px 8px;align-items:center;background:${i%2===0?'var(--bg-card)':'var(--bg-card2)'};`;
        const lbl=document.createElement('span'); lbl.style.color='var(--fg-primary)'; lbl.textContent=`Subject ${i+1}:`;
        const e=mke('');
        row.append(lbl,e);
        if(isGwa){
          const u=mke(savedEntries[i*2+1]||'1');
          row.appendChild(u); leftEntries.push(e,u); nav.push(e,u);
        } else {
          leftEntries.push(e); nav.push(e);
        }
        leftBody.appendChild(row);
      }
      bindArrowNav(nav,isGwa?2:1); return;
    }

    if(typ==="Overall"&&grading==="GWA") {
      const labels=["Previous Quarter Grade (GWA 1–5):","Weight of Previous Grade (0–1):","Current Quarter Grade (GWA 1–5):","Weight of Current Grade (0–1):"];
      const nav=[];
      for(const [j,lb] of labels.entries()) {
        const row=document.createElement('div');
        row.style.cssText='display:flex;align-items:center;gap:8px;padding:5px 8px;';
        const l=document.createElement('span'); l.style.cssText='color:var(--fg-primary);font-size:13px;flex:1;'; l.textContent=lb;
        const e=mke(''); row.append(l,e); leftBody.appendChild(row);
        leftEntries.push(e); nav.push(e);
      }
      bindArrowNav(nav,1); return;
    }

    if(typ==="Overall") {
      let n=Math.max(parseInt(rec.number||4)||4,1);
      const nav=[];
      for(let i=0;i<n;i++) {
        const row=document.createElement('div');
        row.style.cssText='display:flex;align-items:center;gap:8px;padding:5px 8px;';
        const l=document.createElement('span'); l.style.cssText='color:var(--fg-primary);font-size:13px;flex:1;'; l.textContent=`Quarter ${i+1} Grade (%):`;
        const e=mke(''); row.append(l,e); leftBody.appendChild(row);
        leftEntries.push(e); nav.push(e);
      }
      bindArrowNav(nav,1);
    }
  }

  // RIGHT PANEL
  const rightPanel=document.createElement('div');
  rightPanel.style.cssText='flex:1;display:flex;flex-direction:column;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;overflow:hidden;';
  const rightHdr=document.createElement('div');
  rightHdr.style.cssText='background:var(--bg-card2);color:var(--accent2);font-size:13px;font-weight:bold;padding:8px 12px;flex-shrink:0;';
  rightHdr.textContent=t('saved_data');
  const rightBody=document.createElement('div');
  rightBody.style.cssText='flex:1;overflow-y:auto;padding:8px;';

  function buildRightPanel() {
    rightBody.innerHTML='';
    const metas=[["File",rec.file_name],["Student",rec.student_name||'—'],["ID",rec.student_id||'—'],["Quarter",rec.quarter||'—'],["System",sys]];
    if(sl) metas.push(["Level",sl]);
    const metaDiv=document.createElement('div'); metaDiv.style.cssText='background:var(--bg-card2);border-radius:4px;padding:4px 8px;margin-bottom:6px;';
    for(const [k,v] of metas) {
      const r=document.createElement('div'); r.style.cssText='display:flex;padding:2px 0;font-size:10px;';
      const key=document.createElement('span'); key.style.cssText='color:var(--fg-muted);min-width:60px;text-align:right;margin-right:6px;'; key.textContent=k+':';
      const val=document.createElement('span'); val.style.color='var(--fg-primary)'; val.textContent=v;
      r.append(key,val); metaDiv.appendChild(r);
    }
    rightBody.appendChild(metaDiv);

    // Pre-calculate result
    let resultStr='—', resultVal=null, colorKey='pass', calcOk=false;
    try {
      if(isCountrySystem(sys)&&sl&&typ!=="Desired Grade"&&typ!=="Individual Subject & Quarter GWA") {
        [resultStr,resultVal]=computeResultCountryFromList(rec.entries||[],sys,sl,typ);
        [,colorKey]=countryStatus(resultVal,sys,sl); calcOk=true;
      } else if(sys==="Pisay"&&typ==="Individual Subject & Quarter GWA") {
        if(rec.subjects&&rec.subjects.length) {
          const avg=capVal(rec.subjects.reduce((a,s)=>a+s.gwa,0)/rec.subjects.length);
          resultStr=`Overall GWA: ${avg.toFixed(2)}%`; resultVal=avg;
          [,colorKey]=gwaStatus(avg,sys,"Percentile"); calcOk=true;
        }
      } else if(typ!=="Desired Grade") {
        [resultStr,resultVal]=computeResult(rec.entries||[],sys,grading,typ);
        [,colorKey]=gwaStatus(resultVal,sys,grading,sl); calcOk=true;
      }
    } catch(ex) { resultStr=`Cannot compute: ${ex.message}`; colorKey='fail'; }

    const [resBg,resFg]=statusColors(colorKey);
    const resBox=document.createElement('div');
    resBox.style.cssText=`background:${resBg};color:${resFg};padding:10px;border-radius:4px;font-size:14px;font-weight:bold;margin-bottom:8px;`;
    if(calcOk&&resultVal!==null) {
      let display=resultStr;
      if(isCountrySystem(sys)&&sl) {
        const gLbl=countryGradeLabel(resultVal,sys,sl);
        const [st]=countryStatus(resultVal,sys,sl);
        const gpaEq=countryGpaEquivalent(resultVal,sys,sl);
        if(gLbl) display+=`  [${gLbl}]`;
        display+=`  ${st}`;
        if(gpaEq) display+=`  |  Equiv: ${gpaEq}`;
      } else {
        const [st]=gwaStatus(resultVal,sys,grading,sl);
        display+=`  ${st}`;
      }
      resBox.textContent=display;
    } else { resBox.textContent=resultStr; }
    rightBody.appendChild(resBox);

    // Entry rows
    if(rec.subjects&&rec.subjects.length&&typ==="Individual Subject & Quarter GWA") {
    const shdr=document.createElement('div');
    shdr.style.cssText='background:var(--bg-card2);color:var(--accent2);font-size:13px;font-weight:bold;padding:8px;';
    shdr.textContent=t('subjects');
      rightBody.appendChild(shdr);
      for(const [j,s] of rec.subjects.entries()) {
        const [st,ck]=gwaStatus(s.gwa,sys,"Percentile"); const [,,fgC]=statusColors(ck);
        const row=document.createElement('div'); row.style.cssText=`display:grid;grid-template-columns:3fr 1fr 1fr 2fr;padding:5px 8px;align-items:center;background:${j%2===0?'var(--bg-card)':'var(--bg-card2)'};`;
        const nm=document.createElement('span'); nm.style.color='var(--fg-primary)'; nm.textContent=s.name;
        const gw=document.createElement('span'); gw.style.cssText='text-align:center;color:var(--accent2);font-weight:bold;'; gw.textContent=convertToGWA(s.gwa);
        const pt=document.createElement('span'); pt.style.cssText='text-align:center;color:var(--fg-secondary);font-size:10px;'; pt.textContent=`(${s.gwa.toFixed(2)}%)`;
        const stS=document.createElement('span'); stS.style.cssText=`text-align:center;color:${fgC};font-size:10px;`; stS.textContent=st;
        row.append(nm,gw,pt,stS); rightBody.appendChild(row);
      }
    } else if(rec.entries&&rec.entries.length) {
    const ehdr=document.createElement('div');
    ehdr.style.cssText='background:var(--bg-card2);color:var(--accent2);font-size:13px;font-weight:bold;padding:8px;';
    ehdr.textContent=t('entries');
    body.appendChild(ehdr);
    for(const [j,val] of rec.entries.entries()) {
      const row=document.createElement('div'); row.className='detail-row';
      const dk=document.createElement('div'); dk.className='detail-key'; dk.textContent=`${t('entry')} ${j+1}:`;
    }if(sys==="Pisay"&&typ==="Subject") {
        const gl=rec.pisay_grade_level||'11';
        const subjects=PISAY_DATA[gl]||[];
        const core=rec.core_choice||'Biology';
        const elect=rec.elective_choice||'Technology';
        const hdrRow=document.createElement('div');
        hdrRow.style.cssText='display:grid;grid-template-columns:3fr 1fr 1fr;background:var(--bg-card2);padding:5px 8px;font-size:10px;color:var(--fg-muted);font-weight:bold;';
        hdrRow.innerHTML='<span>Subject</span><span style="text-align:center">GWA</span><span style="text-align:center">Units</span>';
        rightBody.appendChild(hdrRow);
        for(const [i,s] of subjects.entries()) {
          let name=s.name;
          if(name==="Electives") name=`${elect} Elective`;
          // Only show core science for grades 11-12
          if((name==="Core Science"||name==="Biology") && parseInt(gl)>=11) name=`${core} Core`;
          const gwaVal=rec.entries[i*2]!==undefined?String(rec.entries[i*2]):'—';
          const unitsVal=rec.entries[i*2+1]!==undefined?String(rec.entries[i*2+1]):String(s.units);
          const row=document.createElement('div');
          row.style.cssText=`display:grid;grid-template-columns:3fr 1fr 1fr;padding:5px 8px;align-items:center;background:${i%2===0?'var(--bg-card)':'var(--bg-card2)'};`;
          const nm=document.createElement('span'); nm.style.color='var(--fg-primary)'; nm.textContent=name;
          const gw=document.createElement('span'); gw.style.cssText='text-align:center;color:var(--accent2);font-weight:bold;'; gw.textContent=gwaVal;
          const un=document.createElement('span'); un.style.cssText='text-align:center;color:var(--fg-secondary);'; un.textContent=unitsVal;
          row.append(nm,gw,un); rightBody.appendChild(row);
        }
      } else {
        const cInfo2=isCountrySystem(sys)&&sl?getCountryInfo(sys,sl):null;
        const isC=!!cInfo2; const modeR=cInfo2?cInfo2.grading_mode:null; const scaleR=cInfo2?cInfo2.scale:'';
        const hdrRow=document.createElement('div');
        const cols2=isC?'1fr 2fr 2fr 2fr':'1fr 3fr';
        hdrRow.style.cssText=`display:grid;grid-template-columns:${cols2};background:var(--bg-card2);padding:5px 8px;font-size:10px;color:var(--fg-muted);font-weight:bold;`;
        hdrRow.innerHTML=`<span>#</span><span style="text-align:center">Saved Value</span>${isC?'<span style="text-align:center">Numeric</span><span style="text-align:center">Grade</span>':''}`;
        rightBody.appendChild(hdrRow);
        for(const [j,val] of rec.entries.entries()) {
          const row=document.createElement('div');
          row.style.cssText=`display:grid;grid-template-columns:${cols2};padding:5px 8px;align-items:center;background:${j%2===0?'var(--bg-card)':'var(--bg-card2)'};`;
          const idx=document.createElement('span'); idx.style.cssText='text-align:center;color:var(--fg-muted);font-size:10px;'; idx.textContent=String(j+1);
          const sv=document.createElement('span'); sv.style.cssText='text-align:center;color:var(--accent2);'; sv.textContent=String(val);
          row.append(idx,sv);
          if(isC) {
            const num=resolveEntryToNumeric(val,scaleR,modeR);
            const numStr=formatNumericForMode(num,modeR);
            const numS=document.createElement('span'); numS.style.cssText=`text-align:center;color:${num!==null?'var(--success)':'var(--warning)'};`; numS.textContent=numStr;
            const gLbl2=num!==null?countryGradeLabel(num,sys,sl):'';
            const gS=document.createElement('span'); gS.style.cssText='text-align:center;color:var(--fg-secondary);font-size:10px;'; gS.textContent=gLbl2;
            row.append(numS,gS);
          }
          rightBody.appendChild(row);
        }
      }
      }
  }

  // Left calculate
  function calcLeft() {
    try {
      if(typ==="Desired Grade"&&isCountrySystem(sys)&&sl) {
        const mode=leftCountryDgMode, scale=leftCountryDgScale, passing=leftCountryDgPassing;
        if(!leftDgCurrent||!leftDgDesired||!leftDgRemain) throw new Error("Fields not found.");
        const [cur]=parseCountryEntry(leftDgCurrent.value.trim(),scale,mode);
        const [des]=parseCountryEntry(leftDgDesired.value.trim(),scale,mode);
        const remStr=leftDgRemain.value.trim();
        if(cur===null||des===null) throw new Error("Invalid grade input.");
        let rem;
        if(remStr.endsWith('%')) rem=parseFloat(remStr)/100;
        else{const rf=parseFraction(remStr);rem=rf<=1?rf:rf/100;}
        if(!rem||rem<=0||rem>1) throw new Error("Remaining weight must be 0.01–1.0.");
        const scaleMax=mode==="GPA_4"?4:mode==="GPA_4_5"?4.5:mode==="GCSE"?9:100;
        const needed=(des-cur*(1-rem))/rem;
        const clamped=Math.max(Math.min(needed,scaleMax),0);
        const gLbl=needed>=0&&needed<=scaleMax?countryGradeLabel(clamped,sys,sl):'';
        if(needed>scaleMax){leftResultLbl.textContent=`Not achievable — required (${needed.toFixed(2)}) > max (${scaleMax}).`;leftResultLbl.style.color='var(--danger)';}
        else if(needed<0){leftResultLbl.textContent="Already surpassed your desired grade!";leftResultLbl.style.color='var(--success)';}
        else{const gp=gLbl?` [${gLbl}]`:'';const msg=mode==="GPA_4"||mode==="GPA_4_5"?`Need ${needed.toFixed(3)}${gp} GPA.`:mode==="GCSE"?`Need band ${needed.toFixed(2)}${gp}.`:`Need ${needed.toFixed(2)}%${gp}.`;leftResultLbl.textContent=msg;leftResultLbl.style.color='var(--info)';}
        return;
      }
      if(typ==="Desired Grade") {
        const isGwa=(grading==="GWA");
        if(!leftDgCurrent||!leftDgDesired||!leftDgRemain) throw new Error("Fields not found.");
        const cur=toNum(leftDgCurrent.value.trim(),isGwa);
        const des=toNum(leftDgDesired.value.trim(),isGwa);
        const rem=toNum(leftDgRemain.value.trim());
        if(cur===null||des===null||rem===null||rem<=0||rem>1) throw new Error("Invalid inputs.");
        if(isGwa){const needed=(des-cur*(1-rem))/rem;if(needed<1){leftResultLbl.textContent="Already surpassed desired GWA!";leftResultLbl.style.color='var(--success)';}else if(needed>5){leftResultLbl.textContent="Not achievable — GWA > 5.00.";leftResultLbl.style.color='var(--danger)';}else{leftResultLbl.textContent=`Need GWA ${needed.toFixed(3)} on remaining.`;leftResultLbl.style.color='var(--info)';}}
        else{const needed=(des-cur*(1-rem))/rem;const np=needed*100;if(np<0){leftResultLbl.textContent="Already surpassed desired grade!";leftResultLbl.style.color='var(--success)';}else if(np>100){leftResultLbl.textContent="Not achievable — score > 100%.";leftResultLbl.style.color='var(--danger)';}else{leftResultLbl.textContent=`Need ${np.toFixed(2)}% on remaining.`;leftResultLbl.style.color='var(--info)';}}
        return;
      }
      if(isCountrySystem(sys)&&sl) {
        const info=getCountryInfo(sys,sl); if(!info) throw new Error("No info.");
        const mode=info.grading_mode, scale=info.scale;
        const values=[];
        for(const e of leftEntries){const raw=e.value.trim();if(!raw)continue;const[n]=parseCountryEntry(raw,scale,mode);if(n===null)throw new Error(`Invalid value '${e.value}'.`);values.push(n);}
        if(!values.length) throw new Error("No grades entered.");
        const avg=values.reduce((a,b)=>a+b,0)/values.length;
        const [st,ck]=countryStatus(avg,sys,sl); const[,,fgC]=statusColors(ck);
        const gLbl=countryGradeLabel(avg,sys,sl); const gpaEq=countryGpaEquivalent(avg,sys,sl);
        let display=mode==="GPA_4"||mode==="GPA_4_5"?`Average: ${avg.toFixed(3)}`:mode==="GCSE"?`Average: ${avg.toFixed(2)}`:`Average: ${avg.toFixed(2)}%`;
        if(gLbl) display+=`  [${gLbl}]`; display+=`  ${st}`;
        if(gpaEq) display+=`  |  Equiv: ${gpaEq}`;
        leftResultLbl.textContent=display; leftResultLbl.style.color=fgC; return;
      }
      const entryVals=leftEntries.map(e=>e.value);
      const[rs,rv]=computeResult(entryVals,sys,grading,typ);
      const[st,ck]=gwaStatus(rv,sys,grading,sl); const[,,fgC]=statusColors(ck);
      let extra='';
      if(grading==="Percentile"&&!isCountrySystem(sys)) extra=`  |  GWA Equiv: ${convertToGWA(rv)}`;
      leftResultLbl.textContent=`${rs}  ${st}${extra}`; leftResultLbl.style.color=fgC;
    } catch(e) { leftResultLbl.textContent=`${e.message}`; leftResultLbl.style.color='var(--warning)'; }
  }

  // Left save
  function saveLeft() {
    promptMsg("Enter a name for this calculation:", async (name)=>{
      let entryVals;
      if(typ==="Desired Grade") {
        entryVals=[(leftDgCurrent&&leftDgCurrent.value)||'',(leftDgDesired&&leftDgDesired.value)||'',(leftDgRemain&&leftDgRemain.value)||''];
      } else {
        entryVals=leftEntries.map(e=>e.value);
      }
      const newRecord={
        file_name:name,student_id:rec.student_id||'',student_name:rec.student_name||'',
        grade_level:rec.grade_level||'',section:rec.section||'',quarter:rec.quarter||'Q1',
        system:sys,pisay_grade_level:rec.pisay_grade_level||'11',grading:grading,type:typ,number:rec.number||'1',
        core_choice:rec.core_choice||'Biology',elective_choice:rec.elective_choice||'Technology',
        entries:entryVals,subjects:[],overall_gwa:0.0,school_level:sl
      };
      try {
        if(isCountrySystem(sys)&&sl&&typ!=="Desired Grade") {
          const info=getCountryInfo(sys,sl);
          if(info){const mode=info.grading_mode,scale=info.scale;const vals=[];for(const v of entryVals){try{const[n]=parseCountryEntry(v,scale,mode);if(n!==null)vals.push(n);}catch{}}if(vals.length)newRecord.overall_gwa=vals.reduce((a,b)=>a+b,0)/vals.length;}
        } else if(typ!=="Desired Grade") {
          const[,val]=computeResult(leftEntries,sys,grading,typ);
          newRecord.overall_gwa=val;
        }
      } catch {}
      await dbSave(newRecord);
      alertMsg(`Saved as '${name}'`);
    });
  }

  const calcBtn=document.createElement('button'); calcBtn.className='btn btn-primary'; calcBtn.style.cssText='padding:8px 16px;'; calcBtn.textContent=t('calculate_new'); calcBtn.onclick=calcLeft;
  const saveBtn=document.createElement('button'); saveBtn.className='btn btn-success'; saveBtn.style.cssText='padding:8px 16px;'; saveBtn.textContent=t('save_this'); saveBtn.onclick=saveLeft;
  leftFooter.style.cssText='padding:8px 12px;background:var(--bg-card);border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:8px;flex-direction:column;';
  const btnRow=document.createElement('div'); btnRow.style.cssText='display:flex;gap:8px;'; btnRow.append(calcBtn,saveBtn);
  leftFooter.append(btnRow,leftResultLbl);

  leftPanel.append(leftHdr,leftBody,leftFooter);
  rightPanel.append(rightHdr,rightBody);
  panels.append(leftPanel,rightPanel);
  body.appendChild(panels);

  buildLeftPanel();
  buildRightPanel();

  win.append(hdr,body);
  showModal(win,'split-modal');
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
function init() {
  initSystemSelect();
  setTypeOptions(["Subject","Overall","Desired Grade"]);
  refreshRightPanel();
  updateNumLabel();
  updateUILanguage(); 
}

init();
</script>
</body>
</html>
